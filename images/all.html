<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>All Works &mdash; World Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Generated by build.py. Data in works.json. -->
<nav class="top-nav">
  <a href="../" class="nav-ws" title="Back to Workspace">&larr;</a>
  <a href="index.html" class="nav-brand">World Gallery</a>
  <div class="nav-links">
    <a href="index.html">Regions</a>
    <a href="artists.html">Artists</a>
    <a href="timeline.html">Timeline</a>
    <a href="all.html" class="active">All works</a>
  </div>
</nav>

<div class="page">
  <header class="page-header">
    <div>
      <h1>All Works</h1>
      <div class="subtitle">Every piece, searchable. Type a title, culture, artist, period, or region.</div>
    </div>
  </header>
  <div class="all-search">
    <input type="text" id="search-input" placeholder="Search 10,488 works&hellip; (e.g. Monet, Buddhist, bronze)" autofocus>
    <div class="result-count" id="result-count">Loading &hellip;</div>
  </div>
  <div class="filter-controls">
    <div class="filter-chips" id="era-chips">
      <button class="era-chip active" data-era="all">All<span class="c">10,488</span></button>
      <button class="era-chip" data-era="pre-1000bce">Before 1000 BCE<span class="c">493</span></button>
      <button class="era-chip" data-era="1000bce-0">1000 BCE – 0<span class="c">836</span></button>
      <button class="era-chip" data-era="0-500">0 – 500 CE<span class="c">1,107</span></button>
      <button class="era-chip" data-era="500-1000">500 – 1000<span class="c">576</span></button>
      <button class="era-chip" data-era="1000-1500">1000 – 1500<span class="c">1,339</span></button>
      <button class="era-chip" data-era="1500-1800">1500 – 1800<span class="c">3,010</span></button>
      <button class="era-chip" data-era="1800+">1800 onward<span class="c">3,127</span></button>
    </div>
    <div class="sort-toggle">
      <button class="sort-btn active" data-sort="region">By region</button>
      <button class="sort-btn" data-sort="year">Chronological</button>
    </div>
  </div>
  <div class="filter-controls">
    <div class="filter-chips" id="region-chips">
      <button class="era-chip active" data-region="all">All regions<span class="c">10,488</span></button>
      <button class="era-chip" data-region="africa">Africa<span class="c">379</span></button>
      <button class="era-chip" data-region="egypt-nubia">Egypt &amp; Nubia<span class="c">608</span></button>
      <button class="era-chip" data-region="mesopotamia-persia">Mesopotamia &amp; Persia<span class="c">308</span></button>
      <button class="era-chip" data-region="mediterranean">Mediterranean<span class="c">442</span></button>
      <button class="era-chip" data-region="europe">Europe<span class="c">3,493</span></button>
      <button class="era-chip" data-region="islamic-world">Islamic World<span class="c">806</span></button>
      <button class="era-chip" data-region="south-asia">South Asia<span class="c">953</span></button>
      <button class="era-chip" data-region="east-asia">East Asia<span class="c">2,209</span></button>
      <button class="era-chip" data-region="southeast-asia-oceania">Southeast Asia &amp; Oceania<span class="c">419</span></button>
      <button class="era-chip" data-region="americas">Americas<span class="c">871</span></button>
    </div>
  </div>
  <div class="filter-controls">
    <div class="filter-chips" id="cat-chips">
      <button class="era-chip active" data-cat="all">All media<span class="c">10,488</span></button>
      <button class="era-chip" data-cat="painting">Painting<span class="c">3,154</span></button>
      <button class="era-chip" data-cat="sculpture">Sculpture<span class="c">949</span></button>
      <button class="era-chip" data-cat="architecture">Architecture<span class="c">388</span></button>
      <button class="era-chip" data-cat="print">Print<span class="c">1,537</span></button>
      <button class="era-chip" data-cat="drawing">Drawing<span class="c">278</span></button>
      <button class="era-chip" data-cat="photograph">Photograph<span class="c">15</span></button>
      <button class="era-chip" data-cat="textile">Textile<span class="c">329</span></button>
      <button class="era-chip" data-cat="ceramic">Ceramic<span class="c">1,169</span></button>
      <button class="era-chip" data-cat="metalwork">Metalwork<span class="c">947</span></button>
      <button class="era-chip" data-cat="manuscript">Manuscript<span class="c">46</span></button>
      <button class="era-chip" data-cat="glass">Glass<span class="c">136</span></button>
      <button class="era-chip" data-cat="lacquer">Lacquer<span class="c">88</span></button>
      <button class="era-chip" data-cat="jewelry">Jewelry<span class="c">18</span></button>
      <button class="era-chip" data-cat="mask">Mask<span class="c">40</span></button>
      <button class="era-chip" data-cat="furniture">Furniture<span class="c">3</span></button>
      <button class="era-chip" data-cat="other">Other<span class="c">1,391</span></button>
    </div>
  </div>
  <div class="grid" id="all-grid"></div>
  <div class="no-results" id="no-results">No works match that search.</div>
  <div class="load-more-wrap">
    <button id="load-more" class="load-more-btn" hidden>Show more &darr;</button>
  </div>
  <footer class="page-footer">
    Images via <a href="https://commons.wikimedia.org/" target="_blank" rel="noopener">Wikimedia Commons</a>. Click any image to open it and see its source.
  </footer>
</div>
<script src="lightbox.js"></script>
<script>
(function() {
  const PAGE_SIZE = 300;
  const input = document.getElementById('search-input');
  const grid = document.getElementById('all-grid');
  const count = document.getElementById('result-count');
  const empty = document.getElementById('no-results');
  const loadMore = document.getElementById('load-more');

  let allWorks = [];
  let filtered = [];
  let rendered = 0;
  let state = { q: '', era: 'all', region: 'all', cat: 'all', sort: 'region' };

  const eraBounds = {
    'all': [null, null],
    'pre-1000bce': [null, -1000],
    '1000bce-0': [-1000, 0],
    '0-500': [0, 500],
    '500-1000': [500, 1000],
    '1000-1500': [1000, 1500],
    '1500-1800': [1500, 1800],
    '1800+': [1800, null]
  };

  function normalize(s) {
    return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  }

  function matchEra(y, era) {
    const [lo, hi] = eraBounds[era] || [null, null];
    if (lo !== null && y < lo) return false;
    if (hi !== null && y >= hi) return false;
    return true;
  }

  function applyFilter() {
    const q = state.q;
    filtered = allWorks.filter(w => {
      if (q && !w.s.includes(q)) return false;
      if (state.era !== 'all' && !matchEra(w.y, state.era)) return false;
      if (state.region !== 'all' && w.rs !== state.region) return false;
      if (state.cat !== 'all' && w.c !== state.cat) return false;
      return true;
    });
    if (state.sort === 'year') {
      filtered.sort((a, b) => (a.y || 0) - (b.y || 0));
    } else {
      filtered.sort((a, b) => a.i - b.i);
    }
    grid.innerHTML = '';
    rendered = 0;
    renderBatch();
    empty.style.display = filtered.length === 0 ? 'block' : 'none';
    const filtering = state.q || state.era !== 'all' || state.region !== 'all' || state.cat !== 'all';
    count.textContent = filtering
      ? (filtered.length.toLocaleString() + ' of ' + allWorks.length.toLocaleString() + ' works')
      : (allWorks.length.toLocaleString() + ' works');
  }

  function cardHtml(w) {
    const artistLine = w.a ? '<div class="work-artist">by <a href="artists/' + w.as + '.html">' + w.a + '</a></div>' : '';
    const desc = w.d ? '<div class="d">' + w.d + '</div>' : '';
    return (
      '<article class="work">' +
      '<img src="' + w.u + '" alt="' + w.t + '" loading="lazy">' +
      '<div class="body">' +
      '<a class="region-badge" href="regions/' + w.rs + '.html">' + w.r + '</a>' +
      '<div class="t">' + w.t + '</div>' +
      artistLine +
      '<div class="meta">' + w.m + '</div>' +
      desc +
      '</div></article>'
    );
  }

  function renderBatch() {
    const next = filtered.slice(rendered, rendered + PAGE_SIZE);
    if (next.length === 0) {
      loadMore.hidden = true;
      return;
    }
    const html = next.map(cardHtml).join('');
    grid.insertAdjacentHTML('beforeend', html);
    rendered += next.length;
    loadMore.hidden = rendered >= filtered.length;
  }

  loadMore.addEventListener('click', renderBatch);
  input.addEventListener('input', () => { state.q = normalize(input.value.trim()); applyFilter(); });

  document.querySelectorAll('#era-chips .era-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#era-chips .era-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.era = chip.dataset.era;
      applyFilter();
    });
  });
  document.querySelectorAll('#region-chips .era-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#region-chips .era-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.region = chip.dataset.region;
      applyFilter();
    });
  });
  document.querySelectorAll('#cat-chips .era-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#cat-chips .era-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.cat = chip.dataset.cat;
      applyFilter();
    });
  });
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.sort = btn.dataset.sort;
      applyFilter();
    });
  });

  // Prefill from ?q= URL param (used by home-page search form).
  const urlQ = new URLSearchParams(location.search).get('q');
  if (urlQ) {
    input.value = urlQ;
    state.q = normalize(urlQ.trim());
  }

  // Fetch data.
  fetch('works.json').then(r => r.json()).then(data => {
    allWorks = data.map((w, i) => { w.i = i; return w; });
    applyFilter();
  }).catch(err => {
    count.textContent = 'Error loading works.';
    console.error(err);
  });
})();
</script>
</body>
</html>
