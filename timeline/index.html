<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0e14;
    --bg2: #070a10;
    --panel: #141a22;
    --line: #1f2731;
    --text: #e5e7eb;
    --muted: #7a8089;
    --universe: #818cf8;
    --science:  #34d399;
    --culture:  #fb7185;
    --tech:     #fbbf24;
    --personal: #f472b6;
  }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; position: relative; }

  /* Parallax starfield */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .stars > div { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; }

  header { padding: 14px 24px 8px; border-bottom: 1px solid var(--line); position: relative; z-index: 10; background: rgba(10,14,20,0.85); backdrop-filter: blur(6px); }
  header h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: -0.3px; display: inline-block; }
  header .byline { color: var(--muted); font-size: 0.78rem; margin-left: 10px; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 10px; }
  #search { flex: 1; min-width: 200px; max-width: 320px; background: var(--panel); border: 1px solid var(--line); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; outline: none; font-family: inherit; }
  #search:focus { border-color: var(--universe); }

  .scales { display: flex; gap: 4px; flex-wrap: wrap; }
  .scale-btn { background: var(--panel); border: 1px solid var(--line); color: var(--muted); padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: inherit; }
  .scale-btn:hover { color: var(--text); border-color: #3a4353; }
  .scale-btn.active { background: #1e3a8a; border-color: #1e3a8a; color: #fff; }

  .filters { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-chip { background: var(--panel); border: 1px solid var(--line); color: var(--muted); padding: 4px 10px; border-radius: 999px; font-size: 0.72rem; cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 5px; }
  .filter-chip .sw { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .filter-chip.off { opacity: 0.4; }
  .filter-chip.off .sw { background: transparent !important; border: 1px solid currentColor; }

  .zoom-ctrls { display: flex; gap: 2px; }
  .zoom-ctrls button { background: var(--panel); border: 1px solid var(--line); color: var(--text); padding: 6px 10px; cursor: pointer; font-family: inherit; }
  .zoom-ctrls button:first-child { border-radius: 6px 0 0 6px; }
  .zoom-ctrls button:last-child { border-radius: 0 6px 6px 0; border-left: none; }
  .zoom-ctrls button:hover { background: #1e2630; }
  #zoom-label { background: var(--panel); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 6px 8px; font-size: 0.74rem; color: var(--muted); font-family: ui-monospace, monospace; min-width: 54px; text-align: center; }

  #viewport { position: absolute; left: 0; right: 0; bottom: 0; top: auto; overflow-x: auto; overflow-y: hidden; cursor: grab; z-index: 1; background: radial-gradient(ellipse at center, var(--bg) 0%, var(--bg2) 100%); }
  #viewport.grabbing { cursor: grabbing; }
  #viewport::-webkit-scrollbar { height: 10px; }
  #viewport::-webkit-scrollbar-track { background: var(--panel); }
  #viewport::-webkit-scrollbar-thumb { background: #2a313d; border-radius: 5px; }

  #canvas { position: relative; height: 100%; min-width: 100%; }

  .axis { position: absolute; left: 0; right: 0; bottom: 24px; height: 1px; background: var(--line); }
  .tick { position: absolute; bottom: 0; width: 1px; background: var(--line); height: 12px; }
  .tick.major { height: 18px; background: #3a4353; }
  .tick-label { position: absolute; bottom: -22px; font-size: 0.72rem; color: var(--muted); transform: translateX(-50%); font-family: ui-monospace, monospace; white-space: nowrap; }

  .track-label { position: absolute; left: 10px; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; background: rgba(10,14,20,0.8); padding: 2px 6px; z-index: 5; border-radius: 3px; }

  .event { position: absolute; transform: translateX(-50%); cursor: pointer; z-index: 2; transition: opacity 0.2s; }
  .event.hidden { opacity: 0; pointer-events: none; }
  .event.dim { opacity: 0.22; }
  .event .dot { width: 12px; height: 12px; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 10px currentColor; transition: all 0.15s; display: flex; align-items: center; justify-content: center; font-size: 9px; background: currentColor; color: #0a0e14; }
  .event.has-emoji .dot { background: var(--panel); color: inherit; font-size: 12px; border: 2px solid currentColor; box-shadow: 0 0 8px currentColor; }
  .event .stem { width: 1px; background: currentColor; margin: 0 auto; opacity: 0.3; }
  .event .title { font-size: 0.74rem; padding: 3px 7px; background: rgba(20,26,34,0.9); border: 1px solid var(--line); border-radius: 4px; color: var(--text); white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; transition: all 0.12s; }
  .event:hover .dot { transform: scale(1.3); }
  .event:hover .title { border-color: currentColor; background: #1e2630; }
  .event.highlighted .dot { transform: scale(1.5); box-shadow: 0 0 16px currentColor, 0 0 30px currentColor; }
  .event.highlighted .title { border-color: currentColor; background: #1e2630; }

  .event.universe { color: var(--universe); }
  .event.science  { color: var(--science); }
  .event.culture  { color: var(--culture); }
  .event.tech     { color: var(--tech); }
  .event.personal { color: var(--personal); }

  /* Hover preview tooltip */
  #tip { position: fixed; max-width: 280px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font-size: 0.82rem; color: var(--text); line-height: 1.4; box-shadow: 0 8px 20px rgba(0,0,0,0.5); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.12s; transform: translate(-50%, -110%); }
  #tip.show { opacity: 1; }
  #tip .tw { color: var(--muted); font-size: 0.7rem; font-family: ui-monospace, monospace; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.07em; }
  #tip .tt { color: #fff; font-weight: 600; font-size: 0.9rem; }

  /* Detail panel */
  #detail { position: fixed; bottom: 16px; right: 16px; max-width: 400px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 16px 18px; box-shadow: 0 12px 30px rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transform: translateY(12px); transition: all 0.2s; z-index: 40; }
  #detail.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
  #detail .d-close { position: absolute; top: 10px; right: 12px; background: transparent; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; }
  #detail .d-close:hover { color: var(--text); }
  #detail .d-when { font-size: 0.72rem; color: var(--muted); font-family: ui-monospace, monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  #detail .d-title { font-size: 1.05rem; font-weight: 600; color: #fff; margin-top: 4px; margin-right: 22px; display: flex; align-items: center; gap: 8px; }
  #detail .d-track { display: inline-block; font-size: 0.68rem; padding: 2px 8px; border-radius: 999px; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  #detail.universe .d-track { background: rgba(129,140,248,0.15); color: var(--universe); }
  #detail.science  .d-track { background: rgba(52,211,153,0.15);  color: var(--science); }
  #detail.culture  .d-track { background: rgba(251,113,133,0.15); color: var(--culture); }
  #detail.tech     .d-track { background: rgba(251,191,36,0.15);  color: var(--tech); }
  #detail.personal .d-track { background: rgba(244,114,182,0.15); color: var(--personal); }
  #detail .d-body { color: #d1d5db; font-size: 0.88rem; line-height: 1.5; margin-top: 12px; }
  #detail .d-links { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  #detail .d-link { background: #1e2630; color: #a5b4fc; border: 1px solid var(--line); padding: 5px 10px; border-radius: 6px; font-size: 0.76rem; text-decoration: none; cursor: pointer; }
  #detail .d-link:hover { border-color: var(--universe); }
  #detail .d-related { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 10px; }
  #detail .d-related h4 { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  #detail .d-related-item { display: block; background: transparent; border: none; color: #a5b4fc; padding: 3px 0; cursor: pointer; font-size: 0.82rem; font-family: inherit; text-align: left; width: 100%; }
  #detail .d-related-item:hover { color: #c7d2fe; text-decoration: underline; }

  .hint { position: fixed; top: 80px; right: 16px; color: var(--muted); font-size: 0.7rem; background: rgba(20,26,34,0.85); border: 1px solid var(--line); padding: 6px 10px; border-radius: 6px; z-index: 5; }
</style>
</head>
<body>
<a href="../" id="dashboard-back-btn" title="Back to Workspace" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(30,42,58,0.92);color:#e8ecf1;padding:6px 11px;font:13px/1.3 Georgia,serif;text-decoration:none;border:1px solid #32445c;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.25);">&larr; Dashboard</a>


<div class="stars" id="stars"></div>

<header>
  <h1>🕰 Timeline</h1>
  <span class="byline">Big Bang → now · click events, drag to pan, wheel to zoom</span>
  <div class="toolbar">
    <input id="search" type="text" placeholder="Search events…  (press / to focus)">
    <div class="scales" id="scales"></div>
    <div class="filters" id="filters"></div>
    <div class="zoom-ctrls">
      <button id="zoom-out" title="Zoom out">−</button>
      <span id="zoom-label">1.0×</span>
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="zoom-reset" title="Reset zoom" style="border-radius:0 6px 6px 0;border-left:1px solid var(--line)">⟲</button>
    </div>
  </div>
</header>

<div id="viewport"><div id="canvas"></div></div>

<div class="hint" id="hint">wheel: zoom · drag: pan · / to search</div>

<div id="tip">
  <div class="tw"></div>
  <div class="tt"></div>
</div>

<div id="detail">
  <button class="d-close">✕</button>
  <div class="d-when"></div>
  <div class="d-title"></div>
  <div class="d-track"></div>
  <div class="d-body"></div>
  <div class="d-links"></div>
  <div class="d-related" style="display:none">
    <h4>Related</h4>
    <div class="d-related-list"></div>
  </div>
</div>

<script>
// =================== DATA ===================

  // ======= COSMIC / UNIVERSE =======

var TRACKS = ["universe", "science", "culture", "tech", "personal"];
var TRACK_LABELS = {
  universe: "Universe & Nature",
  science: "Science",
  culture: "Culture",
  tech: "Technology",
  personal: "Personal",
};

// =================== STATE ===================
var state = {
  zoom: 1.0,               // 1.0 = 1x; contentWidth = viewport * zoom * baseZoomFactor
  scaleKey: "civ",         // presets position the time window
  activeTracks: new Set(TRACKS),
  query: "",
  range: null,             // {min, max}
  log: false,              // log scale (only cosmic/life)
  center: null,            // focused year for zoom
};

// Zoom presets configure (range, log). Continuous zoom then expands/compresses.
var SCALES = {
  cosmic: { label: "Cosmic",      sub: "13.8 Bya",  range: [-13800000000, 2030], log: true  },
  life:   { label: "Life & Earth",sub: "4 Bya",     range: [-4000000000,  2030], log: true  },
  civ:    { label: "Civilization",sub: "10,000 BCE",range: [-10000,       2030], log: false },
  modern: { label: "Modern",      sub: "1700",      range: [1700,         2030], log: false },
};

// =================== UTILITIES ===================
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function formatYear(y) {
  if (y <= -1e9) return (y / -1e9).toFixed(1).replace(/\.0$/, '') + ' Bya';
  if (y <= -1e6) return (y / -1e6).toFixed(0) + ' Mya';
  if (y <= -10000) return (Math.round(-y / 1000)).toLocaleString() + ',000 yrs ago';
  if (y < 0) return Math.abs(y).toLocaleString() + ' BCE';
  if (y < 1000) return y + ' CE';
  return String(y);
}

function posFor(year) {
  var min = state.range[0], max = state.range[1];
  if (year < min) year = min;
  if (year > max) year = max;
  if (!state.log) return (year - min) / (max - min);
  var nowRef = max + 1;
  var aMin = Math.log(Math.max(1, nowRef - min));
  var aMax = Math.log(1);
  var a = Math.log(Math.max(1, nowRef - year));
  return 1 - (a - aMax) / (aMin - aMax);
}

// Reverse: canvas x fraction (0..1) -> year
function yearFor(frac) {
  var min = state.range[0], max = state.range[1];
  if (!state.log) return min + frac * (max - min);
  var nowRef = max + 1;
  var aMin = Math.log(Math.max(1, nowRef - min));
  var aMax = Math.log(1);
  var a = aMax + (1 - frac) * (aMin - aMax);
  return nowRef - Math.exp(a);
}

// =================== PARALLAX STARFIELD ===================
(function makeStars() {
  var c = document.getElementById('stars');
  var n = 120;
  for (var i = 0; i < n; i++) {
    var d = document.createElement('div');
    var size = Math.random() * 2 + 0.5;
    d.style.width = size + 'px';
    d.style.height = size + 'px';
    d.style.left = (Math.random() * 100) + '%';
    d.style.top = (Math.random() * 100) + '%';
    d.style.opacity = Math.random() * 0.6 + 0.1;
    d.dataset.depth = (Math.random() * 0.5 + 0.2).toFixed(2);
    c.appendChild(d);
  }
})();

// =================== RENDERING ===================
function applyScale(key) {
  var s = SCALES[key];
  state.scaleKey = key;
  state.range = s.range.slice();
  state.log = s.log;
  state.zoom = 1.0;
}

function buildCanvas() {
  var canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  var vp = document.getElementById('viewport');
  var baseW = Math.max(vp.clientWidth, 1200);
  var targetWidth = baseW * state.zoom;
  canvas.style.width = targetWidth + 'px';

  // axis
  var axis = document.createElement('div');
  axis.className = 'axis';
  canvas.appendChild(axis);

  // ticks — dynamically pick from range
  var ticks = chooseTicks();
  ticks.forEach(function(t) {
    if (t < state.range[0] || t > state.range[1]) return;
    var x = posFor(t) * targetWidth;
    var tick = document.createElement('div');
    tick.className = 'tick major';
    tick.style.left = x + 'px';
    canvas.appendChild(tick);
    var label = document.createElement('div');
    label.className = 'tick-label';
    label.style.left = x + 'px';
    label.textContent = formatYear(t);
    canvas.appendChild(label);
  });

  // lane heights
  var h = vp.clientHeight;
  var visibleTracks = TRACKS.filter(function(t) { return state.activeTracks.has(t); });
  var laneH = Math.max(60, (h - 80) / Math.max(1, visibleTracks.length));
  var trackTop = {};
  visibleTracks.forEach(function(t, i) {
    var top = 16 + i * laneH;
    trackTop[t] = top;
    var lbl = document.createElement('div');
    lbl.className = 'track-label';
    lbl.style.top = top + 'px';
    lbl.textContent = TRACK_LABELS[t];
    canvas.appendChild(lbl);
  });

  // events with collision-avoidance: group events by lane & proximity, stack vertically
  var relevant = EVENTS.filter(function(e) {
    return state.activeTracks.has(e.track) && e.year >= state.range[0] && e.year <= state.range[1];
  });
  relevant.sort(function(a, b) { return a.year - b.year; });

  // place events with vertical jitter to avoid overlaps
  var placed = {};  // track -> array of {x, slot}
  visibleTracks.forEach(function(t) { placed[t] = []; });
  var q = (state.query || '').toLowerCase().trim();

  relevant.forEach(function(e) {
    var x = posFor(e.year) * targetWidth;
    // pick a vertical slot not occupied within 40px
    var slots = placed[e.track];
    var slot = 0;
    while (true) {
      var clash = slots.some(function(p) { return p.slot === slot && Math.abs(p.x - x) < 56; });
      if (!clash) break;
      slot++;
      if (slot > 5) break;
    }
    slots.push({ x: x, slot: slot });
    var baseTop = trackTop[e.track];
    var slotOffset = slot * 32;
    var stemHeight = Math.max(10, laneH - 44 - slotOffset);

    var el = document.createElement('div');
    el.className = 'event ' + e.track + (e.emoji ? ' has-emoji' : '');
    el.style.left = x + 'px';
    el.style.top = (baseTop + slotOffset) + 'px';
    el.dataset.title = e.title;
    el.innerHTML =
      '<div class="dot">' + (e.emoji ? escapeHtml(e.emoji) : '') + '</div>' +
      '<div class="stem" style="height:' + stemHeight + 'px"></div>' +
      '<div class="title">' + escapeHtml(e.title) + '</div>';

    if (q && matchesQuery(e, q)) el.classList.add('highlighted');
    else if (q) el.classList.add('dim');

    el.addEventListener('click', function(ev) { ev.stopPropagation(); showDetail(e); });
    el.addEventListener('mouseenter', function(ev) { showTip(e, ev); });
    el.addEventListener('mousemove', function(ev) { moveTip(ev); });
    el.addEventListener('mouseleave', hideTip);
    canvas.appendChild(el);
  });
}

function chooseTicks() {
  var min = state.range[0], max = state.range[1];
  var span = max - min;
  if (state.log) {
    // Log scale — hand-pick milestones
    if (min < -1e9) return [-13800000000, -4600000000, -3800000000, -540000000, -250000000, -65000000, -10000, 0, 2000];
    if (min < -1e6) return [-4000000000, -2500000000, -540000000, -250000000, -65000000, -6000000, -300000, -10000, 0, 2000];
  }
  // linear — choose sensible step
  var step;
  if (span > 12000) step = 2000;
  else if (span > 3000) step = 1000;
  else if (span > 800) step = 100;
  else if (span > 400) step = 50;
  else if (span > 200) step = 25;
  else step = 10;
  var ticks = [];
  var start = Math.ceil(min / step) * step;
  for (var t = start; t <= max; t += step) ticks.push(t);
  return ticks;
}

function matchesQuery(e, q) {
  return [e.title, e.body, e.track, String(e.year)].some(function(v) {
    return String(v).toLowerCase().indexOf(q) !== -1;
  });
}

// =================== HOVER TIP ===================
function showTip(e, ev) {
  var t = document.getElementById('tip');
  t.querySelector('.tw').textContent = formatYear(e.year);
  t.querySelector('.tt').textContent = e.title;
  t.classList.add('show');
  moveTip(ev);
}
function moveTip(ev) {
  var t = document.getElementById('tip');
  t.style.left = ev.clientX + 'px';
  t.style.top = ev.clientY + 'px';
}
function hideTip() {
  document.getElementById('tip').classList.remove('show');
}

// =================== DETAIL PANEL ===================
function showDetail(e) {
  var d = document.getElementById('detail');
  d.className = 'show ' + e.track;
  d.querySelector('.d-when').textContent = formatYear(e.year);
  d.querySelector('.d-title').textContent = (e.emoji ? e.emoji + '  ' : '') + e.title;
  d.querySelector('.d-track').textContent = TRACK_LABELS[e.track];
  d.querySelector('.d-body').textContent = e.body;

  var links = d.querySelector('.d-links');
  links.innerHTML = '';
  if (e.source) {
    var a = document.createElement('a');
    a.className = 'd-link';
    a.href = e.source; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = '↗ Source';
    links.appendChild(a);
  }
  if (e.links) {
    if (e.links.archive) {
      var la = document.createElement('a');
      la.className = 'd-link';
      la.href = e.links.archive; la.target = '_blank'; la.rel = 'noopener';
      la.textContent = '📖 Read in Archive';
      links.appendChild(la);
    }
    if (e.links.science) {
      var ls = document.createElement('a');
      ls.className = 'd-link';
      ls.href = e.links.science; ls.target = '_blank'; ls.rel = 'noopener';
      ls.textContent = '🔬 Science notes';
      links.appendChild(ls);
    }
    if (e.links.flag) {
      var lf = document.createElement('a');
      lf.className = 'd-link';
      lf.href = '/static/projects/flags/Countries_Flags_Facts.html#' + encodeURIComponent(e.links.flag);
      lf.target = '_blank'; lf.rel = 'noopener';
      lf.textContent = '🏳 ' + e.links.flag + ' in Flags';
      links.appendChild(lf);
    }
  }

  var relatedBox = d.querySelector('.d-related');
  var relatedList = d.querySelector('.d-related-list');
  relatedList.innerHTML = '';
  if (e.related && e.related.length) {
    relatedBox.style.display = '';
    e.related.forEach(function(t) {
      var match = EVENTS.find(function(x) { return x.title === t; });
      if (!match) return;
      var btn = document.createElement('button');
      btn.className = 'd-related-item';
      btn.textContent = '→ ' + t + '  (' + formatYear(match.year) + ')';
      btn.addEventListener('click', function() { jumpTo(match); });
      relatedList.appendChild(btn);
    });
    if (!relatedList.children.length) relatedBox.style.display = 'none';
  } else {
    relatedBox.style.display = 'none';
  }

  updateHash(e);
}

document.querySelector('#detail .d-close').addEventListener('click', function() {
  document.getElementById('detail').className = '';
});

// =================== NAV: jump to event ===================
function jumpTo(e) {
  // Ensure the event's year is within current range; if not, switch to a scale that covers it
  if (e.year < state.range[0] || e.year > state.range[1]) {
    var target = 'cosmic';
    if (e.year >= -4000000000) target = 'life';
    if (e.year >= -10000) target = 'civ';
    if (e.year >= 1700) target = 'modern';
    applyScale(target);
    renderScales();
    renderFilters();
    buildCanvas();
  }
  scrollToYear(e.year);
  showDetail(e);
}

function scrollToYear(year) {
  var vp = document.getElementById('viewport');
  var canvas = document.getElementById('canvas');
  var x = posFor(year) * canvas.clientWidth;
  vp.scrollLeft = Math.max(0, x - vp.clientWidth / 2);
}

// =================== SEARCH ===================
document.getElementById('search').addEventListener('input', function(ev) {
  state.query = ev.target.value;
  buildCanvas();
  // If there's a first match, scroll to it
  var q = state.query.toLowerCase().trim();
  if (q) {
    var first = EVENTS.filter(function(e) {
      return state.activeTracks.has(e.track) && e.year >= state.range[0] && e.year <= state.range[1] && matchesQuery(e, q);
    }).sort(function(a, b) { return a.year - b.year; })[0];
    if (first) scrollToYear(first.year);
  }
});

document.getElementById('search').addEventListener('keydown', function(ev) {
  if (ev.key === 'Escape') { ev.target.value = ''; state.query = ''; buildCanvas(); }
  if (ev.key === 'Enter') {
    var q = state.query.toLowerCase().trim();
    var first = EVENTS.filter(function(e) { return matchesQuery(e, q); }).sort(function(a, b) { return a.year - b.year; })[0];
    if (first) jumpTo(first);
  }
});

// =================== SCALE BUTTONS ===================
function renderScales() {
  var container = document.getElementById('scales');
  container.innerHTML = '';
  Object.keys(SCALES).forEach(function(key) {
    var s = SCALES[key];
    var btn = document.createElement('button');
    btn.className = 'scale-btn' + (key === state.scaleKey ? ' active' : '');
    btn.textContent = s.label;
    btn.title = s.sub + ' — now';
    btn.addEventListener('click', function() {
      applyScale(key);
      renderScales();
      buildCanvas();
      document.getElementById('viewport').scrollLeft = 0;
      updateHash();
    });
    container.appendChild(btn);
  });
}

// =================== TRACK FILTERS ===================
function renderFilters() {
  var container = document.getElementById('filters');
  container.innerHTML = '';
  TRACKS.forEach(function(t) {
    var chip = document.createElement('span');
    chip.className = 'filter-chip' + (state.activeTracks.has(t) ? '' : ' off');
    chip.style.color = 'var(--' + t + ')';
    chip.innerHTML = '<span class="sw" style="background: var(--' + t + ')"></span>' + TRACK_LABELS[t];
    chip.addEventListener('click', function() {
      if (state.activeTracks.has(t)) state.activeTracks.delete(t);
      else state.activeTracks.add(t);
      renderFilters();
      buildCanvas();
    });
    container.appendChild(chip);
  });
}

// =================== ZOOM ===================
function setZoom(z, centerFrac) {
  var vp = document.getElementById('viewport');
  var canvas = document.getElementById('canvas');
  var oldWidth = canvas.clientWidth;
  var oldCenter = centerFrac != null ? centerFrac : (vp.scrollLeft + vp.clientWidth / 2) / oldWidth;
  state.zoom = Math.max(0.5, Math.min(40, z));
  buildCanvas();
  document.getElementById('zoom-label').textContent = state.zoom.toFixed(1) + '×';
  var newWidth = canvas.clientWidth;
  vp.scrollLeft = Math.max(0, oldCenter * newWidth - vp.clientWidth / 2);
}

document.getElementById('zoom-in').addEventListener('click', function() { setZoom(state.zoom * 1.5); });
document.getElementById('zoom-out').addEventListener('click', function() { setZoom(state.zoom / 1.5); });
document.getElementById('zoom-reset').addEventListener('click', function() { setZoom(1.0); });

// =================== VIEWPORT INTERACTION ===================
(function() {
  var vp = document.getElementById('viewport');
  var isDown = false, startX = 0, scrollStart = 0;

  vp.addEventListener('mousedown', function(e) {
    if (e.target.closest('.event') || e.target.closest('#detail') || e.target.closest('#tip')) return;
    isDown = true; startX = e.pageX; scrollStart = vp.scrollLeft;
    vp.classList.add('grabbing');
  });
  window.addEventListener('mouseup', function() { isDown = false; vp.classList.remove('grabbing'); });
  window.addEventListener('mousemove', function(e) {
    if (!isDown) return;
    vp.scrollLeft = scrollStart - (e.pageX - startX);
  });

  // Wheel: pan vertically-translated wheels, zoom with Ctrl or pinch
  vp.addEventListener('wheel', function(e) {
    if (e.ctrlKey) {
      // pinch zoom
      e.preventDefault();
      var rect = vp.getBoundingClientRect();
      var mouseFrac = (vp.scrollLeft + (e.clientX - rect.left)) / document.getElementById('canvas').clientWidth;
      var factor = e.deltaY < 0 ? 1.18 : 1/1.18;
      setZoom(state.zoom * factor, mouseFrac);
      return;
    }
    // shift-wheel or plain vertical wheel pans horizontally
    if (Math.abs(e.deltaX) < Math.abs(e.deltaY)) {
      vp.scrollLeft += e.deltaY;
      e.preventDefault();
    }
  }, { passive: false });

  // Parallax: update star positions based on scroll
  vp.addEventListener('scroll', function() {
    var frac = vp.scrollLeft / Math.max(1, document.getElementById('canvas').clientWidth);
    var stars = document.getElementById('stars').children;
    for (var i = 0; i < stars.length; i++) {
      var depth = parseFloat(stars[i].dataset.depth);
      stars[i].style.transform = 'translateX(' + (-frac * depth * 200) + 'px)';
    }
  });
})();

// =================== GLOBAL KEYS ===================
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === '/') { e.preventDefault(); document.getElementById('search').focus(); }
  else if (e.key === 'Escape') { document.getElementById('detail').className = ''; }
  else if (e.key === '+' || e.key === '=') { setZoom(state.zoom * 1.3); }
  else if (e.key === '-' || e.key === '_') { setZoom(state.zoom / 1.3); }
  else if (e.key === '0') { setZoom(1.0); }
});

// =================== URL HASH ===================
function updateHash(e) {
  var parts = [ 'scale=' + state.scaleKey ];
  if (e) parts.push('event=' + encodeURIComponent(e.title));
  history.replaceState(null, '', '#' + parts.join('&'));
}

function readHash() {
  var h = window.location.hash.replace(/^#/, '');
  if (!h) return;
  var params = {};
  h.split('&').forEach(function(p) {
    var i = p.indexOf('=');
    if (i > 0) params[p.slice(0, i)] = decodeURIComponent(p.slice(i + 1));
  });
  if (params.scale && SCALES[params.scale]) applyScale(params.scale);
  if (params.event) {
    var match = EVENTS.find(function(x) { return x.title === params.event; });
    if (match) {
      setTimeout(function() { jumpTo(match); }, 100);
    }
  }
}

// =================== INIT ===================
applyScale(state.scaleKey);
readHash();
renderScales();
renderFilters();
buildCanvas();
window.addEventListener('resize', function() { buildCanvas(); });
</script>
