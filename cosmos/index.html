// ============================================================================
// SCENE SWITCHING + RENDER LOOP
// ============================================================================
function switchScene(name) {
  if (current && scenes[current] && scenes[current].onLeave) scenes[current].onLeave();
  current = name;
  releaseFocus();
  scaleFormatter = null;
  document.getElementById('scaleBar').classList.remove('show');
  if (scenes[name] && scenes[name].onEnter) scenes[name].onEnter();
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  hideInfoCard();
}

document.getElementById('speedSlider').addEventListener('input', (e) => {
  document.getElementById('speedVal').textContent = e.target.value + '×';
});

// ----- Time controls -----
const SPEED_PRESETS = [
  -36525, -3650, -365, -100, -30, -10, -1, -0.1,
  0.1, 1, 10, 30, 100, 365, 3650, 36525
];
function nudgeSpeed(dir) {
  const cur = Time.daysPerSecond;
  // find closest preset, then move by dir
  let bestIdx = 0, bestDelta = Infinity;
  SPEED_PRESETS.forEach((v, i) => {
    const d = Math.abs(Math.log10(Math.abs(v)+1e-9) - Math.log10(Math.abs(cur)+1e-9)) + (Math.sign(v) !== Math.sign(cur) ? 100 : 0);
    if (d < bestDelta) { bestDelta = d; bestIdx = i; }
  });
  const next = Math.max(0, Math.min(SPEED_PRESETS.length-1, bestIdx + dir));
  Time.daysPerSecond = SPEED_PRESETS[next];
}
document.getElementById('tPlayPause').addEventListener('click', () => { Time.paused = !Time.paused; refreshTimeUI(); });
document.getElementById('tStepFwd').addEventListener('click', () => { Time.daysSinceEpoch += 1; refreshTimeUI(); });
document.getElementById('tStepBack').addEventListener('click', () => { Time.daysSinceEpoch -= 1; refreshTimeUI(); });
document.getElementById('tReverse').addEventListener('click', () => { Time.daysPerSecond = -Time.daysPerSecond; refreshTimeUI(); });
document.getElementById('tSlower').addEventListener('click', () => { nudgeSpeed(-1); refreshTimeUI(); });
document.getElementById('tFaster').addEventListener('click', () => { nudgeSpeed(+1); refreshTimeUI(); });
document.getElementById('tNow').addEventListener('click', () => { Time.setDate(new Date()); refreshTimeUI(); });
document.getElementById('tDate').addEventListener('change', (e) => {
  const d = new Date(e.target.value + 'T12:00:00Z');
  if (!isNaN(d)) Time.setDate(d);
});

// ----- Mode bar (true-scale toggle) -----
document.getElementById('mCompressed').addEventListener('click', () => scenes.solar.setMode('compressed'));
document.getElementById('mTrue').addEventListener('click', () => scenes.solar.setMode('true'));
document.getElementById('mMarble').addEventListener('click', () => scenes.solar.setMode('marble'));
document.getElementById('mProbes').addEventListener('click', (e) => {
  const cur = e.currentTarget.classList.contains('active');
  scenes.solar.setProbesVisible(!cur);
});
document.getElementById('mLight').addEventListener('click', () => LightMeasure.toggle());
document.getElementById('galaxyConstBtn').addEventListener('click', (e) => {
  const now = !e.currentTarget.classList.contains('active');
  e.currentTarget.classList.toggle('active', now);
  e.currentTarget.style.background = now ? '#e94560' : 'rgba(0,0,0,0.7)';
  e.currentTarget.style.borderColor = now ? '#e94560' : 'rgba(255,255,255,0.15)';
  e.currentTarget.style.color = now ? '#fff' : '#ccc';
  if (scenes.galaxy) scenes.galaxy.setConstellationsVisible(now);
});

// ----- Search -----
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
let searchSel = -1;

function renderSearch(q) {
  q = q.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('show'); searchResults.innerHTML = ''; return; }
  const hits = Search.items.filter(it => it.name.toLowerCase().includes(q)).slice(0, 12);
  if (!hits.length) { searchResults.classList.remove('show'); return; }
  searchResults.innerHTML = hits.map((h, i) =>
    '<div class="sr-item' + (i === searchSel ? ' sel' : '') + '" data-i="' + i + '">' + h.name +
    '<span class="sub">' + h.sub + ' · ' + h.scene + '</span></div>'
  ).join('');
  searchResults.classList.add('show');
  searchResults._hits = hits;
}

function pickSearch(i) {
  const hits = searchResults._hits || [];
  if (!hits[i]) return;
  const hit = hits[i];
  if (hit.scene !== current) switchScene(hit.scene);
  // Slight delay so the new scene is initialized before action runs
  setTimeout(() => hit.action(), 50);
  searchInput.value = '';
  searchResults.classList.remove('show');
  searchSel = -1;
}

searchInput.addEventListener('input', () => { searchSel = -1; renderSearch(searchInput.value); });
searchInput.addEventListener('keydown', (e) => {
  const hits = searchResults._hits || [];
  if (e.key === 'ArrowDown') { e.preventDefault(); searchSel = Math.min(hits.length-1, searchSel+1); renderSearch(searchInput.value); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); searchSel = Math.max(0, searchSel-1); renderSearch(searchInput.value); }
  else if (e.key === 'Enter') { e.preventDefault(); pickSearch(searchSel < 0 ? 0 : searchSel); }
  else if (e.key === 'Escape') { searchInput.value=''; searchResults.classList.remove('show'); searchInput.blur(); }
});
searchResults.addEventListener('click', (e) => {
  const item = e.target.closest('.sr-item');
  if (item) pickSearch(+item.dataset.i);
});
document.addEventListener('click', (e) => {
  if (!document.getElementById('searchBox').contains(e.target)) searchResults.classList.remove('show');
});

// Init all scenes up front (they're cheap) and start the loop
scenes.solar     = buildSolar();
scenes.galaxy    = buildGalaxy();
scenes.universe  = buildUniverse();
scenes.earthview = buildEarthView();
scenes.earthmap  = buildEarthMap();
scenes.exoplanets= buildExoplanets();
scenes.sandbox   = buildSandbox();
scenes.glossary  = buildGlossaryTab();
renderGlossary();
switchScene('solar');
refreshTimeUI();

// Sandbox controls
(function() {
  let paused = false;
  const playBtn = document.getElementById('sbPlay');
  playBtn.addEventListener('click', () => {
    paused = !paused;
    scenes.sandbox.setPaused(paused);
    playBtn.textContent = paused ? '▶' : '⏸';
  });
  document.getElementById('sbReset').addEventListener('click', () => {
    const act = document.querySelector('.sbPreset.active');
    scenes.sandbox.resetScenario(act ? act.dataset.preset : 'solar');
  });
  document.querySelectorAll('.sbPreset').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.sbPreset').forEach(x => {
      x.classList.remove('active');
      x.style.background = 'rgba(255,255,255,0.08)'; x.style.borderColor = 'rgba(255,255,255,0.15)'; x.style.color = '#ddd';
    });
    b.classList.add('active');
    b.style.background = '#e94560'; b.style.borderColor = '#e94560'; b.style.color = '#fff';
    scenes.sandbox.resetScenario(b.dataset.preset);
  }));
  document.querySelectorAll('.sbSpeed').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.sbSpeed').forEach(x => {
      x.classList.remove('active');
      x.style.background = 'rgba(255,255,255,0.08)'; x.style.borderColor = 'rgba(255,255,255,0.15)'; x.style.color = '#ddd';
    });
    b.classList.add('active');
    b.style.background = '#e94560'; b.style.borderColor = '#e94560'; b.style.color = '#fff';
    scenes.sandbox.setTimeScale(parseFloat(b.dataset.speed));
  }));
})();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  const s = scenes[current];
  if (!s) return;
  updateFlyAnim(dt);
  updateFocusTracking();
  LightMeasure.step(dt);
  if (s.controls) s.controls.update();
  if (s.update) s.update(dt);
  updateScaleBar();
  if (s.scene && s.camera) renderer.render(s.scene, s.camera);
}
animate();
</script>
