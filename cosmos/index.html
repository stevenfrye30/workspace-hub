<script>
// ============================================================================
// SHARED SETUP
// ============================================================================
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight, false);

const scenes = {};   // { solar: {scene, camera, controls, update}, ... }
let current = null;
let clock = new THREE.Clock();

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  for (const k in scenes) {
    const s = scenes[k];
    s.camera.aspect = window.innerWidth / window.innerHeight;
    s.camera.updateProjectionMatrix();
  }
}
window.addEventListener('resize', onResize);

function makeStarfield(count, radius) {
  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = radius * Math.cbrt(Math.random());
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
  }
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, sizeAttenuation: true, transparent: true, opacity: 0.8 });
  return new THREE.Points(geom, mat);
}

function makeLabel(text, color) {
  const canvas2 = document.createElement('canvas');
  canvas2.width = 256; canvas2.height = 64;
  const ctx = canvas2.getContext('2d');
  ctx.fillStyle = color || '#ffffff';
  ctx.font = 'bold 28px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 8;
  ctx.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(canvas2);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(4, 1, 1);
  return sprite;
}

// Authoritative epoch: J2000.0 (2000-01-01 12:00 UT)
const J2000_MS = Date.UTC(2000, 0, 1, 12, 0, 0);

// ============================================================================
// TIME CONTROLLER — drives Solar System orbital positions for any date
// ============================================================================
const Time = {
  daysSinceEpoch: (Date.now() - J2000_MS) / 86400000,
  daysPerSecond: 1,        // simulation speed (signed)
  paused: false,
  setDate(d) { this.daysSinceEpoch = (d.getTime() - J2000_MS) / 86400000; },
  asDate() { return new Date(J2000_MS + this.daysSinceEpoch * 86400000); },
  step(realDt) { if (!this.paused) this.daysSinceEpoch += this.daysPerSecond * realDt; },
};

function fmtSpeed(dps) {
  const a = Math.abs(dps), s = dps < 0 ? '−' : '';
  if (a < 1) return s + (a*24).toFixed(2) + ' hr/sec';
  if (a < 365) return s + a.toFixed(2) + ' day/sec';
  if (a < 36500) return s + (a/365.25).toFixed(2) + ' yr/sec';
  return s + (a/36525).toFixed(2) + ' century/sec';
}

function refreshTimeUI() {
  const d = Time.asDate();
  const iso = d.toISOString().slice(0, 10);
  const el = document.getElementById('tDate');
  if (el && document.activeElement !== el) el.value = iso;
  document.getElementById('tSpeed').textContent = (Time.paused ? 'paused · ' : '') + fmtSpeed(Time.daysPerSecond);
  document.getElementById('tPlayPause').textContent = Time.paused ? '▶' : '⏸';
}

// ============================================================================
// CAMERA FLY-TO + FOCUS TRACKING
// ============================================================================
const Focus = {
  target: null,         // THREE.Object3D being tracked
  name: null,
  offset: new THREE.Vector3(),  // desired camera offset relative to target
  anim: null,           // { t, dur, fromPos, toPos, fromTarget, toTarget }
};

function flyTo(scene, camera, controls, targetPos, lookAt, dur = 1.2) {
  const fromPos = camera.position.clone();
  const fromLook = controls.target.clone();
  const toPos = targetPos.clone();
  const toLook = lookAt.clone();
  Focus.anim = { t: 0, dur, fromPos, toPos, fromLook, toLook, controls };
}

function updateFlyAnim(dt) {
  const a = Focus.anim; if (!a) return;
  a.t = Math.min(a.dur, a.t + dt);
  const u = a.t / a.dur;
  // ease in-out
  const e = u < 0.5 ? 2*u*u : 1 - Math.pow(-2*u + 2, 2)/2;
  const s = scenes[current]; if (!s) return;
  s.camera.position.lerpVectors(a.fromPos, a.toPos, e);
  s.controls.target.lerpVectors(a.fromLook, a.toLook, e);
  if (a.t >= a.dur) Focus.anim = null;
}

function focusOnObject(obj, name, displayDistance = null) {
  const s = scenes[current]; if (!s) return;
  Focus.target = obj;
  Focus.name = name;
  // Default offset: based on object scale (or fallback) along current camera direction
  const objWorld = new THREE.Vector3(); obj.getWorldPosition(objWorld);
  const radius = (obj.geometry && obj.geometry.boundingSphere ? obj.geometry.boundingSphere.radius : 1) * (obj.scale ? obj.scale.x : 1);
  const dist = displayDistance != null ? displayDistance : Math.max(radius * 6, 2);
  const dir = new THREE.Vector3().subVectors(s.camera.position, objWorld).normalize();
  if (dir.lengthSq() < 0.0001) dir.set(0, 0.4, 1).normalize();
  Focus.offset.copy(dir).multiplyScalar(dist);
  flyTo(s.scene, s.camera, s.controls, objWorld.clone().add(Focus.offset), objWorld, 1.0);
  document.getElementById('focusPill').classList.add('show');
  document.getElementById('focusName').textContent = name;
}

function releaseFocus() {
  Focus.target = null;
  Focus.anim = null;
  document.getElementById('focusPill').classList.remove('show');
}

function updateFocusTracking() {
  if (!Focus.target || Focus.anim) return;
  const s = scenes[current]; if (!s) return;
  const objWorld = new THREE.Vector3(); Focus.target.getWorldPosition(objWorld);
  // Maintain camera offset relative to target so it follows orbital motion
  const desiredCamPos = objWorld.clone().add(Focus.offset);
  s.camera.position.copy(desiredCamPos);
  s.controls.target.copy(objWorld);
  // Capture user-driven offset changes so manual pan/zoom adjust the offset
  Focus.offset.copy(desiredCamPos).sub(objWorld);
}

// Recompute offset after user manually orbits/zooms: track delta of camera relative to target
function captureOffsetFromUserMove() {
  if (!Focus.target) return;
  const s = scenes[current]; if (!s) return;
  const objWorld = new THREE.Vector3(); Focus.target.getWorldPosition(objWorld);
  Focus.offset.copy(s.camera.position).sub(objWorld);
}

// ============================================================================
// SEARCH REGISTRY — scenes register findable items here
// ============================================================================
const Search = { items: [] };  // { name, scene, action }

function registerSearchable(name, scene, action, sub) {
  Search.items.push({ name, scene, action, sub: sub || '' });
}

// ============================================================================
// SCALE BAR — per-scene formatter, updated each frame
// ============================================================================
let scaleFormatter = null;
function setScaleFormatter(fn) { scaleFormatter = fn; }
function updateScaleBar() {
  const bar = document.getElementById('scaleBar');
  const s = scenes[current];
  if (!scaleFormatter || !s || !s.camera) { bar.classList.remove('show'); return; }
  const tgt = (s.controls && s.controls.target) ? s.controls.target : new THREE.Vector3();
  const dist = s.camera.position.distanceTo(tgt);
  const txt = scaleFormatter(dist, s.camera);
  if (!txt) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  document.getElementById('scaleVal').innerHTML = txt;
}

const KM_PER_AU = 149597870.7;
const C_KMS = 299792.458; // speed of light km/s

function buildSolar() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 200000);
  camera.position.set(0, 30, 55);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // Starfield backdrop
  scene.add(makeStarfield(3000, 400));

  // Sun
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd66 });
  const sun = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), sunMat);
  sun.userData = SUN_INFO;
  scene.add(sun);
  // Sun glow
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(2.8, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0xffaa22, transparent: true, opacity: 0.18, side: THREE.BackSide })
  );
  scene.add(glow);
  scene.add(new THREE.PointLight(0xffffff, 1.2, 0, 2));
  scene.add(new THREE.AmbientLight(0x222233));

  // Planets — visDist + visR are recomputed when scale mode changes
  const planetObjs = [];
  let mode = 'compressed';   // 'compressed' | 'true' | 'marble'

  function recomputeScale() {
    if (mode === 'compressed') {
      sun.scale.setScalar(1);
      glow.scale.setScalar(1);
    } else if (mode === 'true') {
      // 1 unit = 0.5 AU. Sun radius (695,700 km) → 695700/(0.5*KM_PER_AU) = ~0.0093 units. Way too small to see, so we set a 1-unit Sun and shrink planets accordingly.
      sun.scale.setScalar(1); glow.scale.setScalar(1);
    } else { // marble
      // 1 unit = 0.05 AU. Earth radius scaled appropriately.
      sun.scale.setScalar(1); glow.scale.setScalar(1);
    }
    for (const o of planetObjs) {
      let visDist, visR;
      if (mode === 'compressed') {
        visDist = 4 + Math.log10(o.p.auReal * 10) * 7;
        visR = 0.18 + Math.log10(o.p.radiusKm / 1000) * 0.32;
      } else if (mode === 'true') {
        // 1 unit = 0.5 AU
        visDist = o.p.auReal / 0.5 * 1; // → distance in units
        // Sun is 1 unit = 0.5 AU = 74,798,935 km. Planet radius in those units:
        const unitKm = 0.5 * KM_PER_AU;
        visR = Math.max(0.0006, o.p.radiusKm / unitKm);
      } else { // marble: 1 unit = 0.05 AU. Sun radius would be tiny (~0.093 u) but visible enough.
        const unitKm = 0.05 * KM_PER_AU;
        visDist = o.p.auReal / 0.05;
        visR = Math.max(0.001, o.p.radiusKm / unitKm);
      }
      o.visDist = visDist;
      o.mesh.geometry.dispose();
      o.mesh.geometry = new THREE.SphereGeometry(visR, 24, 24);
      // Update orbit ring
      o.orbit.geometry.dispose();
      o.orbit.geometry = new THREE.BufferGeometry().setFromPoints(
        Array.from({length: 257}, (_, i) => {
          const a = (i/256) * Math.PI * 2;
          return new THREE.Vector3(Math.cos(a)*visDist, 0, Math.sin(a)*visDist);
        })
      );
      // Replace ring child if Saturn
      if (o.ringMesh) {
        o.ringMesh.geometry.dispose();
        o.ringMesh.geometry = new THREE.RingGeometry(visR*1.4, visR*2.3, 48);
      }
      // Move label up
      if (o.label) o.label.position.y = visR + (mode === 'compressed' ? 0.6 : visR * 1.5);
    }
  }

  for (const p of PLANETS) {
    const orbit = new THREE.Line(
      new THREE.BufferGeometry(),
      new THREE.LineBasicMaterial({ color: 0x333344, transparent: true, opacity: 0.5 })
    );
    scene.add(orbit);

    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 24, 24),
      new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.85, metalness: 0.05 })
    );
    mesh.userData = p;
    scene.add(mesh);

    let ringMesh = null;
    if (p.ring) {
      ringMesh = new THREE.Mesh(
        new THREE.RingGeometry(0.7, 1.15, 48),
        new THREE.MeshBasicMaterial({ color: 0xc9a66b, side: THREE.DoubleSide, transparent: true, opacity: 0.65 })
      );
      ringMesh.rotation.x = Math.PI / 2.3;
      mesh.add(ringMesh);
    }

    const label = makeLabel(p.name, '#ffffff');
    label.position.y = 0.6;
    mesh.add(label);

    planetObjs.push({ p, mesh, orbit, ringMesh, label, visDist: 0 });
  }
  recomputeScale();

  // ---------- Probes ----------
  const probeObjs = [];
  let probesVisible = true;
  function distToScene(au) {
    if (mode === 'compressed') return 4 + Math.log10(au * 10) * 7;
    if (mode === 'true')       return au / 0.5;
    return au / 0.05;
  }
  function probeRadius() {
    if (mode === 'compressed') return 0.18;
    if (mode === 'true')       return 0.025;
    return 0.04;
  }
  for (const pr of PROBES) {
    const mat = new THREE.MeshBasicMaterial({ color: pr.color });
    const mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.2, 0), mat);
    mesh.userData = pr;
    scene.add(mesh);
    const label = makeLabel(pr.glyph, '#' + pr.color.toString(16).padStart(6,'0'));
    label.scale.set(2, 0.5, 1);
    label.position.y = 0.4;
    mesh.add(label);
    probeObjs.push({ pr, mesh, label });
  }
  function placeProbes() {
    const r = probeRadius();
    for (const o of probeObjs) {
      o.mesh.geometry.dispose();
      o.mesh.geometry = new THREE.OctahedronGeometry(r, 0);
      o.label.position.y = r * 2.2;
      o.mesh.visible = probesVisible;
      if (o.pr.onPlanet) {
        // Track the host planet's current position
        const host = planetObjs.find(p => p.p.name === o.pr.onPlanet);
        if (host) {
          // Offset slightly so the marker isn't lost in the planet
          const off = host.mesh.geometry.parameters.radius * 1.6;
          o.mesh.position.copy(host.mesh.position).add(new THREE.Vector3(off, off*0.4, 0));
        }
      } else {
        const lon = (o.pr.dirDeg || 0) * Math.PI / 180;
        const lat = (o.pr.latDeg || 0) * Math.PI / 180;
        const d = distToScene(o.pr.auReal);
        o.mesh.position.set(
          Math.cos(lat) * Math.cos(lon) * d,
          Math.sin(lat) * d,
          Math.cos(lat) * Math.sin(lon) * d
        );
      }
    }
  }
  // Hook into recomputeScale by wrapping it
  const _origRecompute = recomputeScale;
  recomputeScale = function() {
    _origRecompute.apply(this, arguments);
    placeProbes();
  };
  placeProbes();

  // ---------- Moon systems ----------
  // Each entry: { hostName, group, moons:[{m, mesh, distScene, periodDays, angle0, label}] }
  const moonSystems = [];
  for (const hostName of Object.keys(MOONS)) {
    const host = planetObjs.find(p => p.p.name === hostName);
    if (!host) continue;
    const group = new THREE.Group();
    group.visible = false;
    scene.add(group);
    const moons = [];
    for (const m of MOONS[hostName]) {
      const moonR = 0.05 * Math.cbrt(m.radiusKm / 1000);
      const moonMesh = new THREE.Mesh(
        new THREE.SphereGeometry(moonR, 16, 16),
        new THREE.MeshStandardMaterial({ color: m.color, roughness: 0.9, metalness: 0.05 })
      );
      moonMesh.userData = { name: m.name, radiusKm: m.radiusKm, periodDays: m.periodDays, note: m.note + ' Orbits ' + hostName + ' at ' + m.distKm.toLocaleString() + ' km.' };
      group.add(moonMesh);
      const moonLabel = makeLabel(m.name, '#dddddd');
      moonLabel.scale.set(2.5, 0.6, 1);
      moonLabel.position.y = moonR + 0.12;
      moonMesh.add(moonLabel);
      // Distance scaling: log-compress distKm into a few host-radius units
      const distScene = Math.log10(1 + m.distKm / 6000) * 0.6;
      moons.push({ m, mesh: moonMesh, distScene, angle0: Math.random() * Math.PI * 2 });
    }
    moonSystems.push({ hostName, host, group, moons });
    // Register moons in search (open the host on click → reveals moon)
    for (const mi of moons) {
      registerSearchable(mi.m.name + ' (' + hostName + ')', 'solar', () => {
        showInfoCard(mi.mesh.userData);
        focusOnObject(host.mesh, hostName);
      }, 'Moon');
    }
  }

  // Raycaster for clicks
  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  renderer.domElement.addEventListener('pointerdown', (e) => {
    if (current !== 'solar') return;
    if (e.button !== 0) return;
    const startX = e.clientX, startY = e.clientY;
    const handleUp = (eu) => {
      window.removeEventListener('pointerup', handleUp);
      // Treat as click only if pointer barely moved (avoid focus on drag-rotate)
      if (Math.hypot(eu.clientX - startX, eu.clientY - startY) > 5) return;
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((eu.clientX - rect.left) / rect.width)  * 2 - 1;
      pointer.y = -((eu.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      raycaster.params.Points = { threshold: 0.05 };
      const moonMeshes = [];
      for (const ms of moonSystems) if (ms.group.visible) for (const mi of ms.moons) moonMeshes.push(mi.mesh);
      const hits = raycaster.intersectObjects([sun, ...planetObjs.map(o => o.mesh), ...probeObjs.filter(o => o.mesh.visible).map(o => o.mesh), ...moonMeshes]);
      if (hits.length) {
        const obj = hits[0].object;
        if (LightMeasure.active) {
          LightMeasure.pick(obj, obj.userData.name || 'object');
        } else {
          showInfoCard(obj.userData);
          focusOnObject(obj, obj.userData.name);
        }
      }
    };
    window.addEventListener('pointerup', handleUp);
  });

  // When the user moves the camera while focused, capture the new offset
  controls.addEventListener('change', () => {
    if (Focus.target && !Focus.anim) captureOffsetFromUserMove();
  });

  // Register searchables
  registerSearchable('Sun', 'solar', () => { showInfoCard(SUN_INFO); focusOnObject(sun, 'Sun'); }, 'Star');
  for (const o of planetObjs) {
    registerSearchable(o.p.name, 'solar', () => { showInfoCard(o.p); focusOnObject(o.mesh, o.p.name); }, 'Planet');
  }
  for (const o of probeObjs) {
    registerSearchable(o.pr.name, 'solar', () => { showInfoCard(o.pr); focusOnObject(o.mesh, o.pr.name); }, 'Probe');
  }

  function setProbesVisible(v) {
    probesVisible = v;
    for (const o of probeObjs) o.mesh.visible = v;
    const btn = document.getElementById('mProbes');
    if (btn) btn.classList.toggle('active', v);
  }

  function setMode(newMode) {
    mode = newMode;
    recomputeScale();
    document.querySelectorAll('#modeBar button').forEach(b => b.classList.remove('active'));
    document.getElementById({ compressed: 'mCompressed', true: 'mTrue', marble: 'mMarble' }[mode]).classList.add('active');
    // Update legend with current mode info
    legendForMode();
  }

  function legendForMode() {
    let body;
    if (mode === 'compressed') {
      body = '<div style="margin-top:6px;color:#aaa;">Distances + sizes are log-scaled so all 8 planets are visible. <strong>Not</strong> to true scale.</div>';
    } else if (mode === 'true') {
      body = '<div style="margin-top:6px;color:#aaa;">1 scene unit = 0.5 AU (~75 M km). Planets shown at <strong>true relative size</strong>. They will appear as tiny dots — that is honest.</div>';
    } else {
      body = '<div style="margin-top:6px;color:#aaa;"><strong>Marble scale.</strong> If Earth were a 1.27 cm marble, the Sun would be a 1.4 m beach ball at 150 m. 1 scene unit ≈ 0.05 AU.</div>';
    }
    document.getElementById('legend').innerHTML =
      '<div><strong>Solar System · ' + (mode === 'compressed' ? 'Compressed' : mode === 'true' ? 'True scale' : 'Marble') + '</strong></div>' +
      body +
      '<div style="margin-top:6px;color:#aaa;">Click a body to focus. Use 🔎 to find anything.</div>';
  }

  return {
    scene, camera, controls,
    setMode, setProbesVisible,
    planetObjs, sun, probeObjs,
    onEnter() {
      document.getElementById('controls').style.display = 'none';
      document.getElementById('legend').style.display = '';
      document.getElementById('timeBar').classList.add('show');
      document.getElementById('modeBar').classList.add('show');
      legendForMode();
      setScaleFormatter((dist, cam) => {
        // Convert scene-distance to AU based on current mode
        let auPerUnit = 0;
        if (mode === 'compressed') {
          // Compressed mode is non-uniform. Show only generic scene units.
          return '<span class="lbl">scene units · </span>' + dist.toFixed(1) + ' u';
        } else if (mode === 'true') auPerUnit = 0.5;
        else if (mode === 'marble') auPerUnit = 0.05;
        const au = dist * auPerUnit;
        const km = au * KM_PER_AU;
        return au.toFixed(3) + ' AU<br><span class="lbl">' + km.toExponential(2) + ' km</span>';
      });
    },
    onLeave() {
      hideInfoCard();
      document.getElementById('timeBar').classList.remove('show');
      document.getElementById('modeBar').classList.remove('show');
    },
    update(dt) {
      Time.step(dt);
      sun.rotation.y += dt * 0.1;
      glow.rotation.y -= dt * 0.05;
      for (const o of planetObjs) {
        // True orbital position from J2000: mean longitude advances at 360°/period per day
        const meanLong = (o.p.meanLongDeg + (360 / o.p.periodDays) * Time.daysSinceEpoch) * Math.PI/180;
        o.mesh.position.set(Math.cos(meanLong) * o.visDist, 0, Math.sin(meanLong) * o.visDist);
        o.mesh.rotation.y += dt * 0.4;
      }
      // Surface probes track their host planet
      for (const o of probeObjs) {
        if (!o.pr.onPlanet || !o.mesh.visible) continue;
        const host = planetObjs.find(p => p.p.name === o.pr.onPlanet);
        if (host) {
          const off = host.mesh.geometry.parameters.radius * 1.6;
          o.mesh.position.copy(host.mesh.position).add(new THREE.Vector3(off, off*0.4, 0));
        }
      }

      // Moon systems: visible only when the focused body is one of the hosts
      for (const ms of moonSystems) {
        const isFocused = Focus.target === ms.host.mesh;
        ms.group.visible = isFocused;
        if (!isFocused) continue;
        // Anchor the group to the host's current world position
        ms.group.position.copy(ms.host.mesh.position);
        // Animate moons around the host
        for (const mi of ms.moons) {
          const ang = mi.angle0 + (2 * Math.PI / mi.m.periodDays) * Time.daysSinceEpoch;
          mi.mesh.position.set(Math.cos(ang) * mi.distScene, 0, Math.sin(ang) * mi.distScene);
          mi.mesh.rotation.y += dt * 0.3;
        }
      }

      refreshTimeUI();
    }
  };
}

function showInfoCard(p) {
  const el = document.getElementById('infoCard');
  const lines = ['<h3>' + p.name + '</h3>'];
  if (p.radiusKm != null)    lines.push('<div class="fact">Radius: <span>' + p.radiusKm.toLocaleString() + ' km</span></div>');
  if (p.auReal != null) {
    const km = (p.auReal * KM_PER_AU).toExponential(3);
    const lt = (p.auReal * KM_PER_AU / C_KMS / 60).toFixed(2);
    lines.push('<div class="fact">Distance from Sun: <span>' + p.auReal.toFixed(3) + ' AU</span></div>');
    lines.push('<div class="fact">  <span>' + km + ' km</span></div>');
    lines.push('<div class="fact">Light from Sun: <span>' + lt + ' min</span></div>');
  }
  if (p.periodDays != null) {
    const yrs = (p.periodDays / 365.25).toFixed(2);
    lines.push('<div class="fact">Year: <span>' + p.periodDays.toLocaleString() + ' days  (' + yrs + ' yr)</span></div>');
  }
  if (p.day)         lines.push('<div class="fact">Day: <span>' + p.day + '</span></div>');
  if (p.tiltDeg != null) lines.push('<div class="fact">Axial tilt: <span>' + p.tiltDeg + '°</span></div>');
  if (p.gravity != null) lines.push('<div class="fact">Gravity: <span>' + p.gravity + ' m/s²  (' + (p.gravity/9.81).toFixed(2) + 'g)</span></div>');
  if (p.atmos)       lines.push('<div class="fact">Atmosphere: <span>' + p.atmos + '</span></div>');
  if (p.moons != null) lines.push('<div class="fact">Moons: <span>' + p.moons + '</span></div>');
  if (p.note)        lines.push('<div class="fact" style="margin-top:8px;font-style:italic;color:#bbb;">' + p.note + '</div>');
  el.innerHTML = lines.join('');
  el.classList.add('show');
}
function hideInfoCard() { document.getElementById('infoCard').classList.remove('show'); }

// MILKY WAY GALAXY
// ============================================================================
function buildGalaxy() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 4000);
  camera.position.set(0, 200, 320);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(makeStarfield(5000, 1500));

  // Central bulge
  const bulge = new THREE.Mesh(
    new THREE.SphereGeometry(18, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0xffd6a0, transparent: true, opacity: 0.7 })
  );
  scene.add(bulge);
  const bulgeGlow = new THREE.Mesh(
    new THREE.SphereGeometry(30, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0xffaa55, transparent: true, opacity: 0.15, side: THREE.BackSide })
  );
  scene.add(bulgeGlow);

  // Sagittarius A* label
  const sgrA = makeLabel('Sgr A★', '#ffcc66');
  sgrA.position.set(0, 24, 0);
  sgrA.scale.set(8, 2, 1);
  scene.add(sgrA);

  // Spiral arm stars
  const starCount = 15000;
  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(starCount * 3);
  const colors = new Float32Array(starCount * 3);
  const ARMS = 4, ARM_OFFSET_MAX = 0.5, ROT_SCALE = 4, GALAXY_RADIUS = 200, DISK_THICK = 6;
  for (let i = 0; i < starCount; i++) {
    const r = Math.pow(Math.random(), 0.6) * GALAXY_RADIUS;
    const arm = i % ARMS;
    const armAngle = (arm / ARMS) * Math.PI * 2;
    const spinAngle = r / GALAXY_RADIUS * ROT_SCALE;
    const scatter = (Math.random() - 0.5) * ARM_OFFSET_MAX * (1 - r / GALAXY_RADIUS * 0.7);
    const angle = armAngle + spinAngle + scatter;
    const y = (Math.random() - 0.5) * DISK_THICK * (1 - r / GALAXY_RADIUS * 0.9);
    positions[i*3]   = Math.cos(angle) * r;
    positions[i*3+1] = y;
    positions[i*3+2] = Math.sin(angle) * r;
    // Color varies from warm center to cool edge
    const t = r / GALAXY_RADIUS;
    colors[i*3]   = 1.0 - t * 0.6;
    colors[i*3+1] = 0.85 - t * 0.3;
    colors[i*3+2] = 0.6 + t * 0.4;
  }
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const starMat = new THREE.PointsMaterial({ size: 1.2, vertexColors: true, transparent: true, opacity: 0.9, sizeAttenuation: true });
  const stars = new THREE.Points(geom, starMat);
  scene.add(stars);

  // Sun marker (we are ~26,000 light-years from the center; galaxy is ~100kly across)
  // In our scale (radius 200 = 50kly), Sun sits at r = 26/50 * 200 = 104 units
  const sunR = 104, sunAngle = Math.PI * 0.6;
  const sunMarker = new THREE.Mesh(
    new THREE.SphereGeometry(1.2, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xffff66 })
  );
  sunMarker.position.set(Math.cos(sunAngle) * sunR, 0.5, Math.sin(sunAngle) * sunR);
  scene.add(sunMarker);
  const sunLabel = makeLabel('◄ You are here', '#ffff99');
  sunLabel.position.copy(sunMarker.position);
  sunLabel.position.y += 5;
  sunLabel.scale.set(12, 3, 1);
  scene.add(sunLabel);

  // ---------- Constellation overlay (seen from Sun/Earth) ----------
  const constGroup = new THREE.Group();
  constGroup.visible = false;
  scene.add(constGroup);
  const CONST_RADIUS = 40;  // sphere radius around Sun marker
  function raDecToVec(raHrs, decDeg, r) {
    const ra = raHrs * 15 * Math.PI/180;  // hours → radians
    const dec = decDeg * Math.PI/180;
    return new THREE.Vector3(
      r * Math.cos(dec) * Math.cos(ra),
      r * Math.sin(dec),
      r * Math.cos(dec) * Math.sin(ra)
    );
  }
  const constellationMeta = [];
  for (const c of CONSTELLATIONS) {
    const group = new THREE.Group();
    // Stars as small glow points
    const starGeom = new THREE.BufferGeometry();
    const starPos = new Float32Array(c.stars.length * 3);
    const starVecs = [];
    c.stars.forEach((st, i) => {
      const v = raDecToVec(st[0], st[1], CONST_RADIUS);
      starPos[i*3] = v.x; starPos[i*3+1] = v.y; starPos[i*3+2] = v.z;
      starVecs.push(v);
    });
    starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starPoints = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xffffaa, size: 1.2, transparent: true, opacity: 0.95, sizeAttenuation: false }));
    group.add(starPoints);
    // Lines
    const linePts = [];
    for (const [a, b] of c.lines) { linePts.push(starVecs[a]); linePts.push(starVecs[b]); }
    const lineGeom = new THREE.BufferGeometry().setFromPoints(linePts);
    const lineMat = new THREE.LineBasicMaterial({ color: 0x7faaff, transparent: true, opacity: 0.55 });
    group.add(new THREE.LineSegments(lineGeom, lineMat));
    // Name label at star centroid
    const centroid = starVecs.reduce((a, v) => a.add(v), new THREE.Vector3()).multiplyScalar(1/starVecs.length);
    const lbl = makeLabel(c.name, '#aaccff');
    lbl.scale.set(4, 1, 1);
    lbl.position.copy(centroid).multiplyScalar(1.08);
    group.add(lbl);
    constGroup.add(group);
    constellationMeta.push({ name: c.name, centroid });
  }
  // Position overlay at Sun marker (need to access sunMarker defined above)
  constGroup.position.copy(sunMarker.position);

  function setConstellationsVisible(v) {
    constGroup.visible = v;
  }

  // Search registrations for galaxy
  for (const c of constellationMeta) {
    registerSearchable(c.name, 'galaxy', () => {
      setConstellationsVisible(true);
      document.getElementById('galaxyConstBtn').classList.add('active');
      showInfoCard({ name: c.name, note: 'Constellation as seen from Earth. Toggle constellations on the galaxy scene to view.' });
      const cam = scenes.galaxy.camera, ctl = scenes.galaxy.controls;
      const look = sunMarker.position.clone();
      const camPos = look.clone().add(c.centroid.clone().multiplyScalar(0.35)).add(new THREE.Vector3(0, 6, 0));
      flyTo(scenes.galaxy.scene, cam, ctl, camPos, look, 1.2);
    }, 'Constellation');
  }

  registerSearchable('Sgr A*', 'galaxy', () => {
    showInfoCard({ name: 'Sagittarius A*', note: 'Supermassive black hole at the centre of the Milky Way. Mass ≈ 4.3 million suns; event-horizon diameter ≈ 24 million km.' });
    focusOnObject(bulge, 'Sgr A*', 60);
  }, 'Black hole');
  registerSearchable('Our Sun (Milky Way)', 'galaxy', () => {
    showInfoCard({ name: 'Our Sun in the Galaxy', note: 'The Sun lies ~26,000 light-years from the Galactic Centre, in the Orion Arm. It orbits the Galactic Centre once every ~225 million years.' });
    focusOnObject(sunMarker, 'Our Sun', 30);
  }, 'You are here');

  return {
    scene, camera, controls, setConstellationsVisible,
    onEnter() {
      releaseFocus();
      document.getElementById('controls').style.display = 'none';
      document.getElementById('legend').style.display = '';
      document.getElementById('galaxyBar').style.display = 'flex';
      document.getElementById('legend').innerHTML =
        '<div><strong>Milky Way</strong></div>' +
        '<div style="margin-top:6px;color:#aaa;">~100,000 light-years across. ~200 billion stars.</div>' +
        '<div style="margin-top:6px;"><span class="sw" style="background:#ffd866"></span>Sgr A★ — supermassive black hole</div>' +
        '<div><span class="sw" style="background:#ffff66"></span>Our Sun (~26,000 ly from center)</div>' +
        '<div style="margin-top:6px;color:#aaa;">Toggle Constellations to see the night sky as viewed from Earth, drawn on a celestial sphere around the Sun marker.</div>';
      setScaleFormatter((dist) => {
        const ly = dist * 250;
        return ly < 1000 ? ly.toFixed(0) + ' ly' : (ly/1000).toFixed(2) + ' kly';
      });
    },
    onLeave() { document.getElementById('galaxyBar').style.display = 'none'; },
    update(dt) {
      stars.rotation.y += dt * 0.015;
      bulge.rotation.y += dt * 0.03;
      // Keep constellation group pinned to Sun marker (stars.rotation.y doesn't affect sunMarker, but be safe)
      constGroup.position.copy(sunMarker.position);
    }
  };
}

// ============================================================================
// OBSERVABLE UNIVERSE
// ============================================================================
function buildUniverse() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 8000);
  camera.position.set(0, 400, 900);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(makeStarfield(2000, 3000));

  const SHELLS = [
    { label: 'Milky Way',           radius: 20,   count: 300,  color: 0xffff99 },
    { label: 'Local Group',         radius: 80,   count: 200,  color: 0xff88aa },
    { label: 'Virgo Supercluster',  radius: 250,  count: 1500, color: 0x88ccff },
    { label: 'Laniakea',            radius: 500,  count: 3000, color: 0xaa99ff },
    { label: 'Observable Universe', radius: 1400, count: 8000, color: 0xffccaa },
  ];

  const shellObjs = [];
  for (const sh of SHELLS) {
    // Shell of galaxies (ring-biased with thickness)
    const geom = new THREE.BufferGeometry();
    const positions = new Float32Array(sh.count * 3);
    for (let i = 0; i < sh.count; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = sh.radius * (0.85 + Math.random() * 0.3);
      positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i*3+2] = r * Math.cos(phi);
    }
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({ color: sh.color, size: sh.radius < 100 ? 1.4 : 2.2, transparent: true, opacity: 0.75, sizeAttenuation: true });
    const pts = new THREE.Points(geom, mat);
    scene.add(pts);

    // Wireframe sphere for the outer shell (CMB-ish)
    if (sh.label === 'Observable Universe') {
      const wire = new THREE.Mesh(
        new THREE.SphereGeometry(sh.radius, 32, 16),
        new THREE.MeshBasicMaterial({ color: 0xffaa77, wireframe: true, transparent: true, opacity: 0.08 })
      );
      scene.add(wire);
    }

    const label = makeLabel(sh.label, '#' + sh.color.toString(16).padStart(6, '0'));
    label.position.set(0, sh.radius * 0.7, sh.radius * 0.7);
    label.scale.set(sh.radius * 0.3, sh.radius * 0.075, 1);
    scene.add(label);

    shellObjs.push(pts);
  }

  // Search: each shell jumps the camera back to look at the corresponding scale
  for (const sh of SHELLS) {
    registerSearchable(sh.label, 'universe', () => {
      const cam = scenes.universe.camera, ctl = scenes.universe.controls;
      const target = new THREE.Vector3(0,0,0);
      const camPos = new THREE.Vector3(0, sh.radius * 0.6, sh.radius * 1.6);
      flyTo(scenes.universe.scene, cam, ctl, camPos, target, 1.2);
      releaseFocus();
      showInfoCard({ name: sh.label, note: ({
        'Milky Way': '~100,000 ly across, ~200 billion stars.',
        'Local Group': '~10 million ly across, ~80 galaxies including Andromeda.',
        'Virgo Supercluster': '~110 million ly across.',
        'Laniakea': 'Our home supercluster, ~520 million ly across.',
        'Observable Universe': '~93 billion ly diameter; we see ~13.8 billion years of light-travel.'
      })[sh.label] });
    }, 'Shell');
  }

  return {
    scene, camera, controls,
    onEnter() {
      releaseFocus();
      document.getElementById('controls').style.display = 'none';
      document.getElementById('legend').style.display = '';
      // 1 unit ≈ 93/1400/2 ≈ 0.0332 Gly → use ratio so outer shell = 46.5 Gly radius
      setScaleFormatter((dist) => {
        const gly = dist * (46.5 / 1400);
        if (gly < 0.001) return (gly * 1000).toFixed(2) + ' Mly';
        return gly.toFixed(3) + ' Gly';
      });
      const rows = SHELLS.map(s => {
        const hex = '#' + s.color.toString(16).padStart(6, '0');
        let scale;
        if (s.label === 'Milky Way')            scale = '~100,000 ly across';
        else if (s.label === 'Local Group')     scale = '~10 million ly across, ~80 galaxies';
        else if (s.label === 'Virgo Supercluster') scale = '~110 million ly across';
        else if (s.label === 'Laniakea')        scale = '~520 million ly across';
        else if (s.label === 'Observable Universe') scale = '~93 billion ly diameter';
        return '<div><span class="sw" style="background:' + hex + '"></span>' + s.label + ' — <span style="color:#888">' + scale + '</span></div>';
      }).join('');
      document.getElementById('legend').innerHTML =
        '<div><strong>Observable Universe</strong></div>' +
        '<div style="margin-top:6px;color:#aaa;">Concentric nested scales. Radii are log-compressed for visibility.</div>' +
        '<div style="margin-top:6px;">' + rows + '</div>';
    },
    onLeave() {},
    update(dt) {
      for (const pts of shellObjs) pts.rotation.y += dt * 0.01;
    }
  };
}

function buildEarthView() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 1000);
  camera.position.set(0, 0.5, 3.2);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.minDistance = 1.2;
  controls.maxDistance = 15;

  scene.add(makeStarfield(4000, 300));

  const loader = new THREE.TextureLoader();
  loader.crossOrigin = 'anonymous';
  const dayTex    = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
  const nightTex  = loader.load('https://threejs.org/examples/textures/planets/earth_lights_2048.png');
  const cloudTex  = loader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
  const normalTex = loader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
  const specTex   = loader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');

  const earth = new THREE.Mesh(
    new THREE.SphereGeometry(1, 96, 96),
    new THREE.MeshPhongMaterial({
      map: dayTex, normalMap: normalTex, specularMap: specTex,
      specular: new THREE.Color(0x333333), shininess: 18,
      emissiveMap: nightTex, emissive: new THREE.Color(0x555555)
    })
  );
  scene.add(earth);

  const clouds = new THREE.Mesh(
    new THREE.SphereGeometry(1.012, 96, 96),
    new THREE.MeshLambertMaterial({ map: cloudTex, transparent: true, opacity: 0.55, depthWrite: false })
  );
  scene.add(clouds);

  // Atmospheric halo
  const atmos = new THREE.Mesh(
    new THREE.SphereGeometry(1.06, 64, 64),
    new THREE.ShaderMaterial({
      uniforms: {},
      vertexShader: `varying vec3 vN; void main(){ vN = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
      fragmentShader: `varying vec3 vN; void main(){ float i = pow(0.7 - dot(vN, vec3(0,0,1.0)), 2.0); gl_FragColor = vec4(0.35,0.6,1.0,1.0) * i; }`,
      blending: THREE.AdditiveBlending, side: THREE.BackSide, transparent: true
    })
  );
  scene.add(atmos);

  const sun = new THREE.DirectionalLight(0xffffff, 1.5);
  sun.position.set(5, 0, 0);
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0x222233, 0.35));

  // Apply axial tilt (~23.44°) by parenting earth+clouds+atmos to a tilted group
  const earthGroup = new THREE.Group();
  earthGroup.rotation.z = -23.44 * Math.PI / 180;
  scene.remove(earth); scene.remove(clouds); scene.remove(atmos);
  earthGroup.add(earth); earthGroup.add(clouds); earthGroup.add(atmos);
  scene.add(earthGroup);

  registerSearchable('Earth (close-up)', 'earthview', () => {
    showInfoCard({ name: 'Earth (close-up)', note: 'Use this view to inspect cloud cover, day/night terminator, and surface features.' });
  }, 'View');

  return {
    scene, camera, controls, earth, sunLight: sun,
    onEnter() {
      releaseFocus();
      document.getElementById('controls').style.display = 'none';
      document.getElementById('legend').style.display = '';
      document.getElementById('timeBar').classList.add('show');
      document.getElementById('legend').innerHTML =
        '<div><strong>Earth from Space</strong></div>' +
        '<div style="margin-top:6px;color:#aaa;">Drag to rotate. Scroll to zoom. Day/night terminator tracks the Sun for the current Time bar date.</div>';
      // Earth radius = 1 unit = 6,371 km
      setScaleFormatter((dist) => {
        const altKm = (dist - 1) * 6371;
        if (altKm <= 0) return 'on surface';
        if (altKm < 1000) return altKm.toFixed(0) + ' km altitude';
        if (altKm < 100000) return (altKm/1000).toFixed(2) + ' × 10³ km';
        return (altKm/1000).toExponential(2) + ' × 10³ km';
      });
    },
    onLeave() {
      document.getElementById('timeBar').classList.remove('show');
    },
    update(dt) {
      Time.step(dt);
      // Earth rotation: 1 sidereal turn per ~0.9973 solar days. Use solar approximation.
      const dayFrac = ((Time.daysSinceEpoch % 1) + 1) % 1;
      // Greenwich meridian faces -X at noon UTC (so subsolar at 0° lon is at noon).
      // Texture's seam is roughly at -180°; the 180° rotation offset below puts Africa near +X for visual familiarity.
      earth.rotation.y = dayFrac * Math.PI * 2 + Math.PI;
      clouds.rotation.y = earth.rotation.y + (Time.daysSinceEpoch * 0.003);

      // Solar declination: peaks at June solstice (~day 172 of Gregorian year).
      const dayOfYear = ((Time.daysSinceEpoch - 0.5) % 365.25 + 365.25) % 365.25;
      const decl = 23.44 * Math.PI/180 * Math.sin(2*Math.PI*(dayOfYear/365.25 - 0.221));
      // Sun stays in scene-X direction (the earthGroup applies the axial tilt to Earth instead).
      // For declination effect within scene, raise/lower the sun in Y:
      const sunDist = 5;
      sun.position.set(sunDist * Math.cos(decl), sunDist * Math.sin(decl), 0);

      // HUD: show current UTC time + subsolar point
      const d = Time.asDate();
      const utc = d.toISOString().replace('T', ' ').slice(0, 16) + ' UTC';
      const subsolarLon = -((dayFrac * 360 + 180) % 360 - 180);  // approximate
      const subsolarLat = decl * 180/Math.PI;
      const hud = document.getElementById('legend');
      if (hud && hud.style.display !== 'none') {
        hud.innerHTML =
          '<div><strong>Earth from Space</strong> · live terminator</div>' +
          '<div style="margin-top:6px;color:#aaa;">' + utc + '</div>' +
          '<div style="color:#aaa;">Subsolar point: ' + subsolarLat.toFixed(1) + '°, ' + subsolarLon.toFixed(1) + '°</div>' +
          '<div style="margin-top:6px;color:#aaa;">Use the time bar to scrub. Day/night follows the Sun.</div>';
      }
    }
  };
}

let mapInstance = null;
let drawnItems = null;
let updateTerminatorFn = null;  // set by initLeafletMap

function buildEarthMap() {
  let termTimer = null;
  return {
    onEnter() {
      document.getElementById('controls').style.display = 'none';
      document.getElementById('legend').style.display = 'none';
      document.getElementById('earthMap').classList.add('show');
      document.getElementById('c').style.display = 'none';
      document.getElementById('timeBar').classList.add('show');
      if (!mapInstance) initLeafletMap();
      setTimeout(() => mapInstance && mapInstance.invalidateSize(), 50);
      // Refresh terminator while this scene is active
      termTimer = setInterval(() => { if (updateTerminatorFn) updateTerminatorFn(); }, 500);
    },
    onLeave() {
      document.getElementById('earthMap').classList.remove('show');
      document.getElementById('c').style.display = '';
      document.getElementById('timeBar').classList.remove('show');
      if (termTimer) { clearInterval(termTimer); termTimer = null; }
    },
    update() {}
  };
}

function initLeafletMap() {
  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 });
  const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '© OpenTopoMap (CC-BY-SA)', maxZoom: 17 });
  const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 19 });
  const terrain = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Terrain_Base/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 13 });
  const physical = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 8 });
  const shaded = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Shaded_Relief/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 13 });
  const ocean = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 13 });
  const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB', maxZoom: 19 });
  const voyager = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB', maxZoom: 19 });
  const nasa = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_CorrectedReflectance_TrueColor/default/2024-06-15/GoogleMapsCompatible_Level9/{z}/{y}/{x}.jpg', { attribution: 'NASA GIBS / MODIS Terra', maxZoom: 9 });
  const cityLights = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_Black_Marble/default/2016-01-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.png', { attribution: 'NASA GIBS / Black Marble', maxZoom: 8 });

  // Overlays — static tile
  const boundaries = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { attribution: 'Boundaries © Esri', maxZoom: 19, opacity: 0.9 });
  const transport = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', { attribution: 'Transport © Esri', maxZoom: 19, opacity: 0.9 });
  // NASA GIBS environmental overlays
  const fires = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_Thermal_Anomalies_All/default/2024-06-15/GoogleMapsCompatible_Level6/{z}/{y}/{x}.png', { attribution: 'NASA GIBS fires', maxZoom: 6, opacity: 0.85 });
  const seaTemp = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/GHRSST_L4_MUR_Sea_Surface_Temperature/default/2024-06-15/GoogleMapsCompatible_Level7/{z}/{y}/{x}.png', { attribution: 'NASA GIBS SST', maxZoom: 7, opacity: 0.8 });
  const snow = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_NDSI_Snow_Cover/default/2024-06-15/GoogleMapsCompatible_Level8/{z}/{y}/{x}.png', { attribution: 'NASA GIBS snow', maxZoom: 8, opacity: 0.8 });
  const clouds = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_Cloud_Top_Temp_Day/default/2024-06-15/GoogleMapsCompatible_Level6/{z}/{y}/{x}.png', { attribution: 'NASA GIBS clouds', maxZoom: 6, opacity: 0.7 });

  // Tectonic plate boundaries — simplified polyline dataset
  const tectonicLines = [
    // Mid-Atlantic Ridge (Arctic → Antarctic)
    [[78,4],[72,-8],[65,-28],[55,-33],[45,-28],[30,-45],[15,-45],[0,-28],[-15,-14],[-30,-14],[-45,-11],[-55,-4]],
    // East Pacific Rise + west coasts
    [[58,-152],[50,-130],[40,-124],[32,-118],[22,-108],[10,-104],[0,-100],[-10,-110],[-25,-112],[-40,-102],[-55,-110],[-60,-150]],
    // Pacific Ring of Fire — west side (Aleutians, Japan, Philippines, Indonesia, NZ)
    [[58,-170],[55,162],[50,155],[42,146],[35,141],[28,138],[20,122],[12,125],[0,132],[-8,138],[-18,168],[-35,178],[-45,172]],
    // Himalayan / Alpide belt
    [[38,-10],[38,10],[40,30],[38,50],[34,70],[28,88],[22,98],[16,110]],
    // Mid-Indian Ocean Ridge
    [[-25,55],[-35,60],[-50,75],[-55,100],[-55,130]],
  ];
  const tectonicLayer = L.layerGroup(tectonicLines.map(coords => L.polyline(coords, { color: '#ff6a6a', weight: 2, opacity: 0.7, dashArray: '6,4' })));

  // Notable volcanoes
  const VOLCANOES = [
    ['Mount Vesuvius', 40.821, 14.426, 'Italy. Destroyed Pompeii in 79 AD.'],
    ['Mount Fuji', 35.361, 138.728, 'Japan. Last erupted 1707.'],
    ['Mount Etna', 37.751, 14.994, 'Italy. Europe\'s most active volcano.'],
    ['Kilauea', 19.421, -155.287, 'Hawaii. One of world\'s most active volcanoes.'],
    ['Mount St. Helens', 46.191, -122.195, 'USA. Erupted 1980, killing 57.'],
    ['Krakatoa', -6.102, 105.423, 'Indonesia. 1883 eruption killed ~36,000.'],
    ['Mount Pinatubo', 15.130, 120.350, 'Philippines. 1991 eruption cooled global climate.'],
    ['Yellowstone', 44.428, -110.588, 'USA. Supervolcano; last super-eruption 640,000 yrs ago.'],
    ['Eyjafjallajökull', 63.633, -19.605, 'Iceland. 2010 eruption grounded EU flights.'],
    ['Mount Tambora', -8.250, 118.000, 'Indonesia. 1815 eruption caused "year without summer".'],
    ['Popocatépetl', 19.023, -98.622, 'Mexico. Frequent activity; near Mexico City.'],
    ['Nyiragongo', -1.520, 29.250, 'DRC. Persistent lava lake.'],
    ['Cotopaxi', -0.680, -78.437, 'Ecuador. One of world\'s highest active volcanoes.'],
    ['Mount Erebus', -77.530, 167.170, 'Antarctica. Southernmost active volcano.'],
    ['Mauna Loa', 19.475, -155.608, 'Hawaii. World\'s largest active volcano by volume.'],
  ];
  const volcanoLayer = L.layerGroup(VOLCANOES.map(v => L.circleMarker([v[1], v[2]], {
    radius: 6, color: '#ff6a6a', weight: 2, fillColor: '#ff3a3a', fillOpacity: 0.6
  }).bindPopup('<strong>🌋 ' + v[0] + '</strong><br>' + v[1].toFixed(3) + ', ' + v[2].toFixed(3) + '<br><span style="color:#888">' + v[3] + '</span>')));

  // Day/night terminator overlay — recomputed as user scrubs Time
  let terminatorLayer = null;
  function computeTerminator() {
    // Returns a polygon covering the night hemisphere
    const d = Time.asDate();
    const daysJ2k = (d.getTime() - J2000_MS) / 86400000;
    const dayOfYear = ((daysJ2k - 0.5) % 365.25 + 365.25) % 365.25;
    const decl = 23.44 * Math.sin(2*Math.PI*(dayOfYear/365.25 - 0.221));
    // Subsolar longitude at current UTC:
    const hours = d.getUTCHours() + d.getUTCMinutes()/60 + d.getUTCSeconds()/3600;
    const subsolarLon = (12 - hours) * 15;  // degrees (noon at sun)
    // Build terminator great circle: for each longitude, lat where sun is on horizon
    const pts = [];
    for (let lon = -180; lon <= 180; lon += 2) {
      const hourAngle = (lon - subsolarLon) * Math.PI/180;
      const lat = Math.atan(-Math.cos(hourAngle) / Math.tan(decl * Math.PI/180)) * 180/Math.PI;
      pts.push([lat, lon]);
    }
    // To shade NIGHT side, wrap around. Determine which hemisphere (N or S) is dark at subsolarLon+180.
    // If decl > 0 (northern summer), south polar region is dark → extend to -90.
    // If decl < 0, north polar region is dark → extend to +90.
    const nightPole = decl >= 0 ? -90 : 90;
    const poly = [[nightPole, -180], ...pts, [nightPole, 180]];
    return poly;
  }
  function updateTerminator() {
    if (!terminatorLayer || !mapInstance.hasLayer(terminatorLayer)) return;
    terminatorLayer.clearLayers();
    const poly = computeTerminator();
    terminatorLayer.addLayer(L.polygon(poly, { color: '#88a0ff', weight: 1, fillColor: '#0a0f1c', fillOpacity: 0.45, stroke: true }));
  }
  terminatorLayer = L.layerGroup();
  updateTerminatorFn = updateTerminator;

  // --- ISS tracker ---
  // Simplified circular-orbit ground track. Period 92.68 min, inclination 51.64°.
  // Anchor: on 2024-01-01 00:00 UT, the ISS was roughly over (lat, lon) ≈ (0, 120°), northbound.
  // This is an illustrative propagation, accurate to ~a few hundred km, not for operations.
  const ISS_ANCHOR_MS = Date.UTC(2024, 0, 1, 0, 0, 0);
  const ISS_PERIOD_SEC = 92.68 * 60;
  const ISS_INC_DEG = 51.64;
  const ISS_NODE_DEG0 = 120;          // ascending-node longitude at anchor (rough)
  const ISS_NODE_DRIFT_DEG_PER_DAY = -5.0;  // J2 regression of RAAN
  function issPosition() {
    const d = Time.asDate();
    const elapsed = (d.getTime() - ISS_ANCHOR_MS) / 1000;
    const orbitFrac = (elapsed / ISS_PERIOD_SEC) % 1;
    const u = orbitFrac * 2 * Math.PI;   // argument of latitude
    const inc = ISS_INC_DEG * Math.PI/180;
    // Position on orbital plane in ECI, then transform to lat/lon
    const x = Math.cos(u);
    const y = Math.sin(u) * Math.cos(inc);
    const z = Math.sin(u) * Math.sin(inc);
    const latRad = Math.asin(z);
    const lonOrbit = Math.atan2(y, x) * 180/Math.PI;
    // Node precession + Earth rotation
    const daysElapsed = (d.getTime() - ISS_ANCHOR_MS) / 86400000;
    const nodeLon = ISS_NODE_DEG0 + ISS_NODE_DRIFT_DEG_PER_DAY * daysElapsed;
    const earthRotDeg = (daysElapsed * 360.9856) % 360; // sidereal rotation
    let lon = lonOrbit + nodeLon - earthRotDeg;
    lon = ((lon + 180) % 360 + 360) % 360 - 180;
    return [latRad * 180/Math.PI, lon];
  }
  const issIcon = L.divIcon({ className: '', html: '<div style="background:#ff6a6a;width:14px;height:14px;border-radius:50%;box-shadow:0 0 12px #ff6a6a,0 0 4px #fff;border:2px solid #fff;"></div>', iconSize: [18,18], iconAnchor: [9,9] });
  const issMarker = L.marker([0,0], { icon: issIcon, title: 'ISS' }).bindPopup('<strong>🛰 International Space Station</strong><br>Altitude ~408 km<br>Speed ~7.66 km/s<br>Orbit period ~92.7 min<br>Inclination 51.64°');
  const issTrack = L.polyline([], { color: '#ff6a6a', weight: 1.5, opacity: 0.6, dashArray: '4,4' });
  const issLayer = L.layerGroup([issTrack, issMarker]);
  let issTimer = null;
  function updateISS() {
    const [lat, lon] = issPosition();
    issMarker.setLatLng([lat, lon]);
    // Build a short forward track (next ~30 min, sampled every minute)
    const savedMs = Time.asDate().getTime();
    const pts = [];
    for (let m = 0; m <= 30; m++) {
      Time.setDate(new Date(savedMs + m * 60000));
      pts.push(issPosition());
    }
    Time.setDate(new Date(savedMs));
    // Split across dateline to avoid straight line wrap
    const segs = [[]];
    for (let i = 0; i < pts.length; i++) {
      if (i > 0 && Math.abs(pts[i][1] - pts[i-1][1]) > 180) segs.push([]);
      segs[segs.length-1].push(pts[i]);
    }
    issTrack.setLatLngs(segs);
  }
  mapInstance = L.map('mapLeaflet', {
    center: [20, 0], zoom: 2, worldCopyJump: true,
    layers: [sat, boundaries]
  });

  const layerCtl = L.control.layers({
    'Satellite (Esri)': sat,
    'Topographic (OpenTopo)': topo,
    'Terrain (Esri)': terrain,
    'Shaded Relief': shaded,
    'Physical': physical,
    'Ocean Bathymetry': ocean,
    'Streets (OSM)': osm,
    'Voyager (CartoDB)': voyager,
    'Dark Matter': dark,
    'NASA MODIS True Color': nasa,
    'City Lights (NASA Black Marble)': cityLights
  }, {
    'Country & place boundaries': boundaries,
    'Roads & transport': transport,
    '🌋 Volcanoes': volcanoLayer,
    'Tectonic plates (simplified)': tectonicLayer,
    '🔥 Active fires (NASA)': fires,
    '🌊 Sea surface temperature': seaTemp,
    '❄ Snow cover': snow,
    '☁ Cloud tops': clouds,
    '🌓 Day / night (live)': terminatorLayer
  }, { position: 'topleft', collapsed: false }).addTo(mapInstance);

  mapInstance.on('overlayadd', (e) => { if (e.layer === terminatorLayer) updateTerminator(); });

  mapInstance.on('overlayadd', (e) => {
    if (e.layer === issLayer) {
      updateISS();
      if (!issTimer) issTimer = setInterval(updateISS, 1500);
    }
  });
  mapInstance.on('overlayremove', (e) => {
    if (e.layer === issLayer && issTimer) { clearInterval(issTimer); issTimer = null; }
  });
  layerCtl.addOverlay(issLayer, '🛰 ISS tracker');

  L.control.scale({ position: 'bottomleft', imperial: true, metric: true, maxWidth: 240 }).addTo(mapInstance);

  drawnItems = new L.FeatureGroup().addTo(mapInstance);
  const drawCtl = new L.Control.Draw({
    position: 'topright',
    edit: { featureGroup: drawnItems },
    draw: {
      polyline: { shapeOptions: { color: '#e94560', weight: 3 }, metric: true, showLength: true },
      polygon:  { shapeOptions: { color: '#ffd866', weight: 2, fillOpacity: 0.25 }, allowIntersection: false, showArea: true, metric: true },
      rectangle:{ shapeOptions: { color: '#8ff', weight: 2, fillOpacity: 0.2 } },
      circle:   { shapeOptions: { color: '#aa99ff', weight: 2, fillOpacity: 0.2 } },
      marker: true, circlemarker: false
    }
  });
  mapInstance.addControl(drawCtl);

  const readout = document.getElementById('measureOut');
  function fmtDist(m) { return m >= 1000 ? (m/1000).toFixed(2) + ' km  ·  ' + (m/1609.344).toFixed(2) + ' mi' : m.toFixed(1) + ' m'; }
  function fmtArea(m2) {
    const km2 = m2 / 1e6, mi2 = m2 / 2589988.11, acres = m2 / 4046.8564;
    if (m2 < 10000) return m2.toFixed(1) + ' m²  ·  ' + acres.toFixed(3) + ' ac';
    return km2.toFixed(3) + ' km²  ·  ' + mi2.toFixed(3) + ' mi²  ·  ' + acres.toFixed(1) + ' ac';
  }
  function lineLength(latlngs) {
    let d = 0;
    for (let i = 1; i < latlngs.length; i++) d += latlngs[i-1].distanceTo(latlngs[i]);
    return d;
  }
  function describe(layer) {
    if (layer instanceof L.Polygon) {
      const area = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
      const peri = lineLength(layer.getLatLngs()[0].concat([layer.getLatLngs()[0][0]]));
      return 'Area: ' + fmtArea(area) + '\nPerimeter: ' + fmtDist(peri);
    }
    if (layer instanceof L.Circle) {
      const r = layer.getRadius();
      return 'Radius: ' + fmtDist(r) + '\nArea: ' + fmtArea(Math.PI * r * r);
    }
    if (layer instanceof L.Polyline) {
      return 'Distance: ' + fmtDist(lineLength(layer.getLatLngs()));
    }
    if (layer instanceof L.Marker) {
      const ll = layer.getLatLng();
      return 'Point: ' + ll.lat.toFixed(5) + ', ' + ll.lng.toFixed(5);
    }
    return '';
  }

  mapInstance.on(L.Draw.Event.CREATED, (e) => {
    drawnItems.addLayer(e.layer);
    const text = describe(e.layer);
    readout.textContent = text;
    e.layer.bindPopup(text.replace(/\n/g, '<br>')).openPopup();
  });
  mapInstance.on(L.Draw.Event.EDITED, (e) => {
    let last = '';
    e.layers.eachLayer(l => { last = describe(l); l.setPopupContent(last.replace(/\n/g, '<br>')); });
    if (last) readout.textContent = last;
  });
  mapInstance.on('mousemove', (e) => {
    if (!readout.textContent.startsWith('Area') && !readout.textContent.startsWith('Distance') && !readout.textContent.startsWith('Radius') && !readout.textContent.startsWith('Point')) {
      readout.textContent = 'Cursor: ' + e.latlng.lat.toFixed(4) + ', ' + e.latlng.lng.toFixed(4);
    }
  });
}

function clearDrawings() {
  if (drawnItems) drawnItems.clearLayers();
  const r = document.getElementById('measureOut');
  if (r) r.textContent = '—';
}

const EXO_COLORS = { rocky:0x8db970, 'super-earth':0x7fa9d9, ocean:0x3dbfd9, 'gas-giant':0xd9a678, 'neptune':0x7fbde0, lava:0xff5a3a, 'brown-dwarf':0x8a5a3a, 'star':0xffe08a };

function buildExoplanets() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 4000);
  camera.position.set(0, 100, 220);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(makeStarfield(3000, 1500));

  // Earth/Sun at origin
  const home = new THREE.Mesh(
    new THREE.SphereGeometry(1.2, 24, 24),
    new THREE.MeshBasicMaterial({ color: 0xffe28a })
  );
  scene.add(home);
  const homeLabel = makeLabel('☀ Home (Sol)', '#ffff99');
  homeLabel.position.y = 3; homeLabel.scale.set(8, 2, 1);
  scene.add(homeLabel);

  // Place exoplanets on a spiral-sphere, radial distance log-scaled from LY
  const exoObjs = [];
  const lyMin = 4, lyMax = 2400;
  const radMin = 8, radMax = 160;
  function lyToUnit(ly) {
    const t = (Math.log10(ly) - Math.log10(lyMin)) / (Math.log10(lyMax) - Math.log10(lyMin));
    return radMin + Math.max(0, Math.min(1, t)) * (radMax - radMin);
  }
  EXOPLANETS.forEach((ex, i) => {
    const [name, ly, type, note] = ex;
    const r = lyToUnit(ly);
    // golden-angle sphere distribution
    const phi = Math.acos(1 - 2 * ((i + 0.5) / EXOPLANETS.length));
    const theta = Math.PI * (1 + Math.sqrt(5)) * i;
    const pos = new THREE.Vector3(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi),
      r * Math.sin(phi) * Math.sin(theta)
    );
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.9 + Math.log10(ly) * 0.2, 16, 16),
      new THREE.MeshBasicMaterial({ color: EXO_COLORS[type] || 0xffffff })
    );
    mesh.position.copy(pos);
    mesh.userData = { name, radiusKm: null, note: 'Type: ' + type + ' · Distance: ' + ly + ' ly from Earth. ' + note };
    scene.add(mesh);
    // Faint line from origin
    const lg = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), pos]);
    const line = new THREE.Line(lg, new THREE.LineBasicMaterial({ color: EXO_COLORS[type] || 0xffffff, transparent: true, opacity: 0.22 }));
    scene.add(line);
    // Label
    const lbl = makeLabel(name, '#' + (EXO_COLORS[type] || 0xffffff).toString(16).padStart(6,'0'));
    lbl.scale.set(6, 1.5, 1);
    lbl.position.copy(pos).add(new THREE.Vector3(0, 2.5, 0));
    scene.add(lbl);
    exoObjs.push({ ex, mesh, pos });

    registerSearchable(name, 'exoplanets', () => {
      showInfoCard(mesh.userData);
      focusOnObject(mesh, name, 10);
    }, type);
  });

  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  renderer.domElement.addEventListener('pointerdown', (e) => {
    if (current !== 'exoplanets') return;
    if (e.button !== 0) return;
    const sx = e.clientX, sy = e.clientY;
    const up = (eu) => {
      window.removeEventListener('pointerup', up);
      if (Math.hypot(eu.clientX - sx, eu.clientY - sy) > 5) return;
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((eu.clientX - rect.left) / rect.width)  * 2 - 1;
      pointer.y = -((eu.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(exoObjs.map(o => o.mesh));
      if (hits.length) {
        showInfoCard(hits[0].object.userData);
        focusOnObject(hits[0].object, hits[0].object.userData.name, 10);
      }
    };
    window.addEventListener('pointerup', up);
  });

  return {
    scene, camera, controls,
    onEnter() {
      releaseFocus();
      document.getElementById('controls').style.display = 'none';
      document.getElementById('legend').style.display = '';
      const rows = Object.entries(EXO_COLORS).map(([k, v]) =>
        '<div><span class="sw" style="background:#' + v.toString(16).padStart(6,'0') + '"></span>' + k + '</div>'
      ).join('');
      document.getElementById('legend').innerHTML =
        '<div><strong>Exoplanets</strong></div>' +
        '<div style="margin-top:6px;color:#aaa;">' + EXOPLANETS.length + ' notable worlds beyond our solar system, distributed around Sol. Distance is log-scaled (4 ly → 2400 ly).</div>' +
        '<div style="margin-top:6px;">' + rows + '</div>';
      // 1 unit ≈ a few ly at center; formatter inverts lyToUnit
      setScaleFormatter((dist) => {
        if (dist < radMin) return 'near home';
        const t = (dist - radMin) / (radMax - radMin);
        const ly = Math.pow(10, Math.log10(lyMin) + t * (Math.log10(lyMax) - Math.log10(lyMin)));
        return ly.toFixed(0) + ' ly from Sol';
      });
    },
    onLeave() {},
    update(dt) {
      home.rotation.y += dt * 0.3;
    }
  };
}

function buildSandbox() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 2000);
  camera.position.set(0, 120, 0);
  camera.lookAt(0, 0, 0);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(makeStarfield(1500, 400));
  scene.add(new THREE.AmbientLight(0xffffff, 0.7));

  // Gravity constant (tuned for feel, not real)
  const G = 40;
  const bodies = [];   // { mass, mesh, v (THREE.Vector3), trailPts }
  const trailMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.7 });
  const trailGroup = new THREE.Group();
  scene.add(trailGroup);

  function addBody(mass, x, y, z, vx, vy, vz, color) {
    const r = Math.max(0.4, Math.cbrt(mass) * 0.35);
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(r, 16, 16),
      new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: mass > 100 ? 0.5 : 0.1 })
    );
    mesh.position.set(x, y, z);
    scene.add(mesh);
    // Trail
    const trailGeom = new THREE.BufferGeometry();
    const trailPos = new Float32Array(600 * 3);
    const trailCol = new Float32Array(600 * 3);
    trailGeom.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
    trailGeom.setAttribute('color', new THREE.BufferAttribute(trailCol, 3));
    trailGeom.setDrawRange(0, 0);
    const trailLine = new THREE.Line(trailGeom, trailMat);
    trailGroup.add(trailLine);
    const hex = new THREE.Color(color);
    bodies.push({ mass, mesh, v: new THREE.Vector3(vx, vy, vz), trailGeom, trailLine, trailLen: 0, color: hex });
  }

  function resetScenario(n) {
    // Clear
    for (const b of bodies) { scene.remove(b.mesh); trailGroup.remove(b.trailLine); b.mesh.geometry.dispose(); b.trailGeom.dispose(); }
    bodies.length = 0;
    if (n === 'solar') {
      addBody(1000, 0, 0, 0, 0, 0, 0, 0xffdd66);
      addBody(2, 15, 0, 0, 0, 0, 8.2, 0x3f7fbf);
      addBody(1, 25, 0, 0, 0, 0, 6.3, 0xc1440e);
      addBody(5, 40, 0, 0, 0, 0, 5.0, 0xd8b892);
    } else if (n === 'binary') {
      addBody(500, -10, 0, 0, 0, 0, -6, 0xffaa66);
      addBody(500,  10, 0, 0, 0, 0,  6, 0xffcc88);
      addBody(1,    30, 0, 0, 0, 0,  4, 0x3f7fbf);
    } else if (n === 'collision') {
      addBody(80,  -30, 0, 0, 4, 0,  0.5, 0x8db970);
      addBody(80,   30, 0, 0, -4, 0, -0.5, 0x7fa9d9);
    } else {
      addBody(1000, 0, 0, 0, 0, 0, 0, 0xffdd66);
    }
  }
  resetScenario('solar');

  // Click to add rogue body on the XZ plane, with random velocity perpendicular to radial
  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  renderer.domElement.addEventListener('pointerdown', (e) => {
    if (current !== 'sandbox') return;
    if (e.button !== 0) return;
    if (!e.shiftKey) return;  // only add on shift-click
    const rect = renderer.domElement.getBoundingClientRect();
    pointer.x = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const pt = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(plane, pt)) {
      const r = pt.length() || 1;
      // tangential velocity for roughly circular orbit around origin (assumes 1000-mass star)
      const speed = Math.sqrt(G * 1000 / r) * 0.85;
      const tang = new THREE.Vector3(-pt.z, 0, pt.x).normalize().multiplyScalar(speed);
      const color = new THREE.Color().setHSL(Math.random(), 0.7, 0.6).getHex();
      addBody(1 + Math.random()*4, pt.x, 0, pt.z, tang.x, 0, tang.z, color);
    }
  });

  let paused = false;
  let timeScale = 1;

  function step(dt) {
    if (paused) return;
    const h = Math.min(dt, 0.033) * timeScale;
    // Verlet-ish: compute accelerations
    const accels = bodies.map(() => new THREE.Vector3());
    for (let i = 0; i < bodies.length; i++) {
      for (let j = i+1; j < bodies.length; j++) {
        const bi = bodies[i], bj = bodies[j];
        const d = new THREE.Vector3().subVectors(bj.mesh.position, bi.mesh.position);
        const distSq = Math.max(0.5, d.lengthSq());
        const invD = 1 / Math.sqrt(distSq);
        const fmag = G * bi.mass * bj.mass / distSq;
        const fvec = d.multiplyScalar(fmag * invD);
        accels[i].add(fvec.clone().divideScalar(bi.mass));
        accels[j].sub(fvec.clone().divideScalar(bj.mass));
      }
    }
    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      b.v.add(accels[i].multiplyScalar(h));
      b.mesh.position.add(b.v.clone().multiplyScalar(h));
      // Trail
      const pos = b.trailGeom.attributes.position.array;
      const col = b.trailGeom.attributes.color.array;
      const N = 600;
      // Shift
      if (b.trailLen < N) {
        const idx = b.trailLen * 3;
        pos[idx] = b.mesh.position.x; pos[idx+1] = b.mesh.position.y; pos[idx+2] = b.mesh.position.z;
        col[idx] = b.color.r; col[idx+1] = b.color.g; col[idx+2] = b.color.b;
        b.trailLen++;
      } else {
        for (let k = 0; k < (N-1)*3; k++) { pos[k] = pos[k+3]; col[k] = col[k+3]; }
        pos[(N-1)*3] = b.mesh.position.x; pos[(N-1)*3+1] = b.mesh.position.y; pos[(N-1)*3+2] = b.mesh.position.z;
      }
      b.trailGeom.setDrawRange(0, b.trailLen);
      b.trailGeom.attributes.position.needsUpdate = true;
      b.trailGeom.attributes.color.needsUpdate = true;
    }
  }

  return {
    scene, camera, controls,
    resetScenario, setPaused(p) { paused = p; }, setTimeScale(s) { timeScale = s; },
    onEnter() {
      releaseFocus();
      document.getElementById('controls').style.display = 'none';
      document.getElementById('legend').style.display = '';
      document.getElementById('sandboxBar').style.display = 'flex';
      document.getElementById('legend').innerHTML =
        '<div><strong>N-body Sandbox</strong></div>' +
        '<div style="margin-top:6px;color:#aaa;">A toy gravity simulation. Units are arbitrary; no real physics scale.</div>' +
        '<div style="margin-top:6px;color:#aaa;"><strong>Shift-click</strong> on the scene to drop a new body in a rough orbit. Use the buttons below to reset scenarios, pause, or change speed.</div>';
      setScaleFormatter(null);
    },
    onLeave() { document.getElementById('sandboxBar').style.display = 'none'; },
    update(dt) { step(dt); }
  };
}

const LightMeasure = {
  active: false,
  picks: [],          // [{obj, name}]
  photonMesh: null,
  photonAnim: null,   // { t, dur, fromPos, toPos, lightSeconds, distAU }
  hud: null,

  toggle() {
    this.active = !this.active;
    document.getElementById('mLight').classList.toggle('active', this.active);
    this.picks = [];
    this.clearPhoton();
    if (this.active) {
      this.showHud('🔦 <strong>Light-travel mode</strong><br><span style="color:#aaa">Click body 1, then body 2.<br>Esc to exit.</span>');
    } else {
      this.hideHud();
    }
  },

  pick(obj, name) {
    if (!this.active) return false;
    this.picks.push({ obj, name });
    if (this.picks.length === 1) {
      this.showHud('🔦 <strong>1 / 2:</strong> ' + name + '<br><span style="color:#aaa">Now click the second body.</span>');
    } else if (this.picks.length === 2) {
      this.fire();
    }
    return true;
  },

  fire() {
    const s = scenes.solar; if (!s) return;
    const a = new THREE.Vector3(); this.picks[0].obj.getWorldPosition(a);
    const b = new THREE.Vector3(); this.picks[1].obj.getWorldPosition(b);
    // Convert scene distance → AU based on solar mode
    let auPerUnit;
    const m = document.querySelector('#modeBar button.active') ? document.querySelector('#modeBar button.active').id : 'mCompressed';
    if (m === 'mTrue') auPerUnit = 0.5;
    else if (m === 'mMarble') auPerUnit = 0.05;
    else auPerUnit = null;  // compressed mode is non-linear
    const sceneDist = a.distanceTo(b);
    let distAU, km, lightSec;
    if (auPerUnit != null) {
      distAU = sceneDist * auPerUnit;
      km = distAU * KM_PER_AU;
      lightSec = km / C_KMS;
    } else {
      // Compressed mode: derive distance from real-world AU values of the two picks if we have them
      const aAU = (this.picks[0].obj.userData && this.picks[0].obj.userData.auReal) || 0;
      const bAU = (this.picks[1].obj.userData && this.picks[1].obj.userData.auReal) || 0;
      // Approximate inter-body distance using current heliocentric angles
      const days = Time.daysSinceEpoch;
      function helioXY(p) {
        if (!p) return { x:0, y:0 };
        const ud = p.userData;
        if (ud === SUN_INFO) return { x:0, y:0 };
        if (ud.auReal == null) return null;
        const lon = ((ud.meanLongDeg || 0) + (ud.periodDays ? (360/ud.periodDays)*days : 0)) * Math.PI/180;
        return { x: ud.auReal * Math.cos(lon), y: ud.auReal * Math.sin(lon) };
      }
      const pa = helioXY(this.picks[0].obj), pb = helioXY(this.picks[1].obj);
      if (pa && pb) {
        distAU = Math.hypot(pa.x - pb.x, pa.y - pb.y);
        km = distAU * KM_PER_AU;
        lightSec = km / C_KMS;
      } else {
        this.showHud('Unable to compute true distance for these objects.');
        return;
      }
    }

    const fmtTime = (s) => s < 60 ? s.toFixed(2) + ' sec' : s < 3600 ? (s/60).toFixed(2) + ' min' : s < 86400 ? (s/3600).toFixed(2) + ' hr' : s < 31557600 ? (s/86400).toFixed(2) + ' days' : (s/31557600).toFixed(2) + ' yr';
    this.showHud(
      '🔦 <strong>' + this.picks[0].name + ' → ' + this.picks[1].name + '</strong><br>' +
      '<span style="color:#ffd866">Distance:</span> ' + distAU.toFixed(3) + ' AU  (' + km.toExponential(2) + ' km)<br>' +
      '<span style="color:#ffd866">Light time:</span> ' + fmtTime(lightSec) + '<br>' +
      '<span style="color:#aaa;font-size:0.74rem">Animating photon… ⌫ exit, click again to redo</span>'
    );

    // Animate a small photon along the line. Cap real-world animation duration.
    this.clearPhoton();
    const photon = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 12, 12),
      new THREE.MeshBasicMaterial({ color: 0xffff88 })
    );
    photon.position.copy(a);
    s.scene.add(photon);
    this.photonMesh = photon;
    const animDur = Math.min(8, Math.max(1.2, lightSec / 60));  // 1 sec anim per 60 sec light, capped at 8s
    this.photonAnim = { t: 0, dur: animDur, fromPos: a.clone(), toPos: b.clone(), lightSec, distAU };
    this.picks = [];   // ready for another measurement
  },

  step(dt) {
    if (!this.photonAnim || !this.photonMesh) return;
    const s = scenes[current]; if (current !== 'solar') { this.clearPhoton(); return; }
    this.photonAnim.t += dt;
    const u = Math.min(1, this.photonAnim.t / this.photonAnim.dur);
    this.photonMesh.position.lerpVectors(this.photonAnim.fromPos, this.photonAnim.toPos, u);
    if (u >= 1) {
      // Hold a moment then fade
      if (this.photonAnim.t > this.photonAnim.dur + 0.6) this.clearPhoton();
    }
  },

  clearPhoton() {
    if (this.photonMesh) {
      const s = scenes.solar;
      if (s) s.scene.remove(this.photonMesh);
      this.photonMesh.geometry.dispose();
      this.photonMesh.material.dispose();
      this.photonMesh = null;
    }
    this.photonAnim = null;
  },

  showHud(html) {
    const el = document.getElementById('lightHud');
    el.innerHTML = html;
    el.style.display = 'block';
  },
  hideHud() { document.getElementById('lightHud').style.display = 'none'; },
};
