<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EmojiLand 🎮</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: radial-gradient(ellipse at top, #1a1230 0%, #0a0815 60%, #050308 100%);
    color: #e5e7eb; min-height: 100vh; padding: 32px 24px 80px;
  }
  header { max-width: 1200px; margin: 0 auto 24px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header .title { flex: 1; min-width: 240px; }
  header h1 {
    font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(90deg, #fbbf24, #ec4899, #8b5cf6);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  header p { color: #9ca3af; font-size: 0.95rem; margin-top: 4px; }
  .back-btn {
    background: #1f1830; border: 1px solid #3a2f55; color: #d1d5db;
    padding: 8px 14px; border-radius: 8px; font-size: 0.85rem;
    text-decoration: none; transition: all 0.15s; cursor: pointer;
  }
  .back-btn:hover { background: #2a2245; border-color: #6d4ed8; color: #fff; }

  .main-tabs {
    max-width: 1200px; margin: 0 auto 20px;
    display: flex; gap: 4px; border-bottom: 1px solid #2e2547;
  }
  .main-tab {
    background: none; border: none; color: #9ca3af;
    padding: 12px 22px; font-size: 1rem; font-weight: 600;
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .main-tab:hover { color: #e5e7eb; }
  .main-tab.active { color: #fbbf24; border-bottom-color: #fbbf24; }

  .panel { display: none; }
  .panel.active { display: block; }

  .controls { max-width: 1200px; margin: 14px auto 18px; display: flex; flex-wrap: wrap; gap: 10px; }
  .search-box {
    flex: 1; min-width: 240px; max-width: 420px;
    background: #1a1530; border: 1px solid #2e2547; color: #e5e7eb;
    padding: 10px 14px; border-radius: 8px; font-size: 0.95rem; outline: none;
    transition: border 0.15s;
  }
  .search-box:focus { border-color: #8b5cf6; }
  .tags { max-width: 1200px; margin: 0 auto 18px; display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: #1a1530; border: 1px solid #2e2547; color: #9ca3af;
    padding: 4px 12px; border-radius: 999px; font-size: 0.78rem; cursor: pointer;
    transition: all 0.12s;
  }
  .tag:hover { border-color: #8b5cf6; color: #e5e7eb; }
  .tag.active { background: #8b5cf6; border-color: #8b5cf6; color: #fff; }

  .grid {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px;
  }
  .card {
    background: linear-gradient(160deg, #1f1735 0%, #15102a 100%);
    border: 1px solid #2e2547; border-radius: 16px; padding: 20px;
    display: flex; flex-direction: column; gap: 10px;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.2s;
    cursor: pointer; position: relative; overflow: hidden;
    text-decoration: none; color: inherit;
  }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent, #8b5cf6);
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent, #8b5cf6);
    box-shadow: 0 10px 30px rgba(139, 92, 246, 0.25);
  }
  .card.coming-soon { opacity: 0.55; cursor: not-allowed; }
  .card.coming-soon:hover { transform: none; box-shadow: none; }
  .card-emoji {
    font-size: 3rem; line-height: 1; align-self: center;
    filter: drop-shadow(0 4px 12px rgba(139, 92, 246, 0.4));
  }
  .card-name { font-size: 1.15rem; font-weight: 600; color: #fff; text-align: center; }
  .card-desc { font-size: 0.82rem; color: #9ca3af; line-height: 1.45; text-align: center; min-height: 36px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
  .card-tag { background: #2a2245; color: #c4b5fd; padding: 2px 8px; border-radius: 999px; font-size: 0.68rem; }
  .badge {
    position: absolute; top: 10px; right: 10px;
    background: #2a2245; color: #c4b5fd; font-size: 0.65rem;
    padding: 3px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .empty { text-align: center; color: #6b7280; padding: 60px; grid-column: 1 / -1; }
  footer { max-width: 1200px; margin: 50px auto 0; color: #4b5563; font-size: 0.78rem; text-align: center; }

  .emoji-grid {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 6px;
  }
  .ec {
    background: #1a1530; border: 1px solid #2e2547; border-radius: 8px;
    padding: 10px 4px 6px; text-align: center; cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .ec:hover { border-color: #8b5cf6; transform: translateY(-2px); }
  .ec-char { font-size: 34px; line-height: 1.2; display: block; }
  .ec-name {
    font-size: 9px; color: #6b7280; margin-top: 4px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 4px;
  }
  .emoji-status { max-width: 1200px; margin: 10px auto; color: #6b7280; font-size: 0.82rem; text-align: right; }
  .copy-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #8b5cf6; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 0.9rem; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    z-index: 200;
  }
  .copy-toast.show { opacity: 1; }
</style>
</head>
<body>
<a href="../" id="dashboard-back-btn" title="Back to Workspace" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(30,42,58,0.92);color:#e8ecf1;padding:6px 11px;font:13px/1.3 Georgia,serif;text-decoration:none;border:1px solid #32445c;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.25);">&larr; Dashboard</a>


<header>
  <div class="title">
    <h1>🎮 EmojiLand</h1>
    <p>Mini games and a browsable emoji library, all in one place</p>
  </div>
  <a href="../../Launcher/index.html" class="back-btn">← Back to Workspace</a>
</header>

<div class="main-tabs">
  <button class="main-tab active" data-panel="emojis">😀 Emojis</button>
  <button class="main-tab" data-panel="games">🎮 Games</button>
</div>

<!-- Emojis panel -->
<div id="panel-emojis" class="panel active">
  <div class="controls">
    <input id="emoji-search" class="search-box" type="search" placeholder="Search emojis by name...">
    <span class="emoji-status" id="emoji-status" style="margin:0;align-self:center"></span>
  </div>
  <div class="tags" id="emoji-groups"></div>
  <div class="tags" id="emoji-subs"></div>
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<!-- Games panel -->
<div id="panel-games" class="panel">
  <div class="controls">
    <input id="games-search" class="search-box" type="search" placeholder="Search games...">
  </div>
  <div class="tags" id="game-tags"></div>
  <div class="grid" id="games-grid"></div>
  <footer>
    Drop new games into <code style="background:#1a1530;padding:2px 6px;border-radius:4px;">projects/play/EmojiGames/games/</code> and add an entry to <code style="background:#1a1530;padding:2px 6px;border-radius:4px;">games.js</code>
  </footer>
</div>

<div class="copy-toast" id="copy-toast"></div>

<script src="games.js"></script>
<script src="emojis.js"></script>
<script>
  // ── Main tab switching ─────────────────────────────────────────────
  document.querySelectorAll('.main-tab').forEach(function(b){
    b.addEventListener('click', function(){
      document.querySelectorAll('.main-tab').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      var p = b.dataset.panel;
      document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('active');});
      document.getElementById('panel-'+p).classList.add('active');
    });
  });

  // ── Copy toast ─────────────────────────────────────────────────────
  var toast = document.getElementById('copy-toast');
  var toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toast.classList.remove('show'); }, 1400);
  }

  // ── Games panel ────────────────────────────────────────────────────
  var gamesGrid = document.getElementById('games-grid');
  var gameTagsEl = document.getElementById('game-tags');
  var gamesSearch = document.getElementById('games-search');
  var activeGameTag = null;
  var allGameTags = [...new Set(GAMES.flatMap(function(g){return g.tags || [];}))].sort();

  function renderGameTags() {
    gameTagsEl.innerHTML = '';
    var allBtn = document.createElement('span');
    allBtn.className = 'tag' + (activeGameTag === null ? ' active' : '');
    allBtn.textContent = 'All';
    allBtn.onclick = function(){ activeGameTag = null; renderGames(); };
    gameTagsEl.appendChild(allBtn);
    allGameTags.forEach(function(t){
      var el = document.createElement('span');
      el.className = 'tag' + (activeGameTag === t ? ' active' : '');
      el.textContent = t;
      el.onclick = function(){ activeGameTag = activeGameTag === t ? null : t; renderGames(); };
      gameTagsEl.appendChild(el);
    });
  }

  function renderGames() {
    renderGameTags();
    var q = gamesSearch.value.trim().toLowerCase();
    var filtered = GAMES.filter(function(g){
      if (activeGameTag && !(g.tags || []).includes(activeGameTag)) return false;
      if (!q) return true;
      return (g.name + ' ' + g.desc).toLowerCase().includes(q);
    });
    gamesGrid.innerHTML = '';
    if (!filtered.length) {
      gamesGrid.innerHTML = '<div class="empty">No games match.</div>';
      return;
    }
    filtered.forEach(function(g){
      var card = document.createElement(g.path ? 'a' : 'div');
      card.className = 'card' + (g.path ? '' : ' coming-soon');
      if (g.path) card.href = g.path;
      if (g.color) card.style.setProperty('--accent', g.color);
      card.innerHTML =
        (!g.path ? '<span class="badge">Coming soon</span>' : '') +
        '<div class="card-emoji">' + g.emoji + '</div>' +
        '<div class="card-name">' + g.name + '</div>' +
        '<div class="card-desc">' + g.desc + '</div>' +
        '<div class="card-tags">' + (g.tags || []).map(function(t){return '<span class="card-tag">'+t+'</span>';}).join('') + '</div>';
      gamesGrid.appendChild(card);
    });
  }
  gamesSearch.addEventListener('input', renderGames);
  renderGames();

  // ── Emojis panel ───────────────────────────────────────────────────
  var emojiGroupsEl = document.getElementById('emoji-groups');
  var emojiSubsEl = document.getElementById('emoji-subs');
  var emojiGridEl = document.getElementById('emoji-grid');
  var emojiSearch = document.getElementById('emoji-search');
  var emojiStatus = document.getElementById('emoji-status');
  var eGrp = 'all', eSub = 'all', eQ = '';
  var PER_PAGE = 500;
  var eLoaded = PER_PAGE;

  function mkTag(label, active) {
    var t = document.createElement('span');
    t.className = 'tag' + (active ? ' active' : '');
    t.textContent = label;
    return t;
  }

  function buildGroups() {
    var grps = ['all'].concat(Array.from(new Set(EMOJIS.map(function(e){return e.grp;}))));
    emojiGroupsEl.innerHTML = '';
    grps.forEach(function(g){
      var t = mkTag(g === 'all' ? 'All Groups' : g, g === eGrp);
      t.onclick = function(){
        eGrp = g; eSub = 'all';
        buildGroups(); buildSubs(); renderEmojis();
      };
      emojiGroupsEl.appendChild(t);
    });
  }

  function buildSubs() {
    emojiSubsEl.innerHTML = '';
    var src = eGrp === 'all' ? EMOJIS : EMOJIS.filter(function(e){return e.grp === eGrp;});
    var subs = ['all'].concat(Array.from(new Set(src.map(function(e){return e.sub;}))));
    if (subs.length <= 2) return;
    subs.forEach(function(s){
      var t = mkTag(s === 'all' ? 'All' : s, s === eSub);
      t.onclick = function(){ eSub = s; buildSubs(); renderEmojis(); };
      emojiSubsEl.appendChild(t);
    });
  }

  function filterEmojis() {
    var s = EMOJIS;
    if (eGrp !== 'all') s = s.filter(function(e){return e.grp === eGrp;});
    if (eSub !== 'all') s = s.filter(function(e){return e.sub === eSub;});
    if (eQ) s = s.filter(function(e){return e.name.toLowerCase().includes(eQ);});
    return s;
  }

  function renderEmojis() {
    var list = filterEmojis();
    eLoaded = PER_PAGE;
    emojiStatus.textContent = list.length.toLocaleString() + ' emojis';
    emojiGridEl.innerHTML = '';
    if (!list.length) {
      emojiGridEl.innerHTML = '<div class="empty">No emojis found.</div>';
      return;
    }
    appendEmojiBatch(list.slice(0, PER_PAGE));
    window._emojiList = list;
    window.scrollTo(0, 0);
  }

  function appendEmojiBatch(items) {
    var frag = document.createDocumentFragment();
    items.forEach(function(e){
      var d = document.createElement('div');
      d.className = 'ec';
      var c = document.createElement('span');
      c.className = 'ec-char'; c.textContent = e.ch;
      var n = document.createElement('div');
      n.className = 'ec-name'; n.textContent = e.name;
      d.appendChild(c); d.appendChild(n);
      d.addEventListener('click', function(){
        navigator.clipboard.writeText(e.ch).then(function(){
          showToast('Copied ' + e.ch);
        });
      });
      frag.appendChild(d);
    });
    emojiGridEl.appendChild(frag);
  }

  // Infinite scroll for emoji grid
  window.addEventListener('scroll', function(){
    if (!document.getElementById('panel-emojis').classList.contains('active')) return;
    var list = window._emojiList;
    if (!list || eLoaded >= list.length) return;
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
      var batch = list.slice(eLoaded, eLoaded + PER_PAGE);
      appendEmojiBatch(batch);
      eLoaded += batch.length;
    }
  });

  emojiSearch.addEventListener('input', function(){
    eQ = emojiSearch.value.trim().toLowerCase();
    renderEmojis();
  });

  buildGroups();
  buildSubs();
  renderEmojis();
</script>

</body>
</html>
