<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atlas</title>
  <meta name="description" content="A small, unhurried collection of worlds to wander — texts, language, gods.">
  <link rel="stylesheet" href="atlas/atlas.css">
</head>
<body>
  <header class="atlas-header">
    <nav class="atlas-nav" aria-label="Primary">
      <a class="brand" href="./">Atlas</a>
      <ul class="worlds-nav" id="worlds-nav" aria-label="Worlds"></ul>
    </nav>
  </header>

  <main class="atlas-main">
    <section class="opening">
      <h1 class="tagline">An atlas of worlds.</h1>
      <p class="intro">A small, unhurried collection of rooms to think in &mdash; each shaped around a subject worth slow attention. Atlas grows one world at a time.</p>
    </section>

    <section class="worlds" aria-label="Featured worlds">
      <div class="world-grid" id="world-grid"></div>
    </section>
  </main>

  <footer class="atlas-footer">
    <p>Atlas &mdash; built slowly, read slowly.</p>
  </footer>

  <script src="atlas/atlas.js"></script>
</body>
</html>
