<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Language &mdash; Atlas</title>
  <meta name="description" content="A close study of language — its scripts, its sounds, and specific languages worth reading closely.">
  <link rel="stylesheet" href="../atlas/atlas.css">
</head>
<body>
  <header class="atlas-header">
    <nav class="atlas-nav" aria-label="Primary">
      <a class="brand" href="../">Atlas</a>
      <ul class="worlds-nav" id="worlds-nav" aria-label="Worlds"></ul>
    </nav>
  </header>

  <main class="atlas-main">
    <article class="world-content" id="world-content"></article>
  </main>

  <footer class="atlas-footer">
    <p>Atlas &mdash; built slowly, read slowly.</p>
  </footer>

  <script src="../atlas/atlas.js"></script>
  <script>
    fetch("./index.md", { cache: "no-cache" })
      .then(function (r) {
        if (!r.ok) throw new Error("Content load failed: " + r.status);
        return r.text();
      })
      .then(function (md) {
        document.getElementById("world-content").innerHTML =
          Atlas.renderMarkdown(md);
      })
      .catch(function (err) {
        console.error("Language: failed to load content", err);
        document.getElementById("world-content").innerHTML =
          '<p class="atlas-error">This world is being prepared.</p>';
      });
  </script>
</body>
</html>
